    row.className = 'ch-input-row'; row.id = 'cmpRow'+idx;
    row.innerHTML = `
      <div class="ch-input-idx">${idx+1}</div>
      <input class="field__input cmp-ch-input" style="height:40px;flex:1" data-idx="${idx}"
             placeholder="https://www.youtube.com/@채널명" autocomplete="off"/>
      <button type="button" class="ch-remove-btn" data-remove="${idx}">✕</button>`;
    container.appendChild(row);
    if (idx >= 2) document.getElementById('addChBtn').disabled = true;
  });

  document.getElementById('cmpInputs').addEventListener('click', e => {
    const btn = e.target.closest('.ch-remove-btn'); if (!btn) return;
    btn.closest('.ch-input-row').remove();
    document.getElementById('addChBtn').disabled = false;
    [...document.querySelectorAll('.cmp-ch-input')].forEach((el,i)=>{ el.closest('.ch-input-row').querySelector('.ch-input-idx').textContent=i+1; el.dataset.idx=i; });
  });

  document.getElementById('cmpForm').addEventListener('submit', async e => {
    e.preventDefault();
    const urls = getInputValues().filter(Boolean);
    if (urls.length < 2){ toast('최소 2개 채널을 입력하세요'); return; }
    App._compareChannels = getInputValues();
    const el = document.getElementById('cmpResult');
    el.innerHTML = '<div class="skeleton" style="height:400px;border-radius:16px"></div>';
    const results = await Promise.allSettled(urls.map(u => API.channelInfo(u)));
    const channels = results.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);
    if (channels.length < 2){ el.innerHTML = '<div class="empty"><h4>채널 데이터를 불러오지 못했습니다</h4><p>URL 형식 또는 API 설정을 확인해주세요.</p></div>'; return; }
    el.innerHTML = renderCompareDetail(channels);
    if (SettingsCfg.load().aiApiKey){
      const sec = document.getElementById('cmpAi');
      if (sec) sec.style.display = '';
      API.aiChannelCompare(channels).then(d =>
        aiSectionShow('cmpAi', 'AI 채널 비교 종합 평가', aiChannelCompareHtml(d))
      );
    }
    el.querySelectorAll('[data-ch-detail]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = +btn.dataset.chDetail;
        App._channelDetailData = channels[idx];
        App.go('channel');
        setTimeout(() => {
          const el2 = document.getElementById('chResult');
          if (el2 && channels[idx]) el2.innerHTML = renderChannelDetail(channels[idx]);
        }, 50);
      });
    });
  });
}

function renderCompareDetail(channels){
  const N = channels.length;
  const avgViews = ch => ch.videoCount > 0 ? Math.round(ch.totalViews / ch.videoCount) : 0;
  const freqLabel = d => d==null?'—':d<=1?'매일':d<=3?`${d.toFixed(0)}일마다`:d<=7?'주1회':d<=14?`${Math.round(d)}일마다`:'저빈도';

  /* find best value for each metric */
  const best = (arr, higher=true) => {
    const vals = arr.map(v=>v??-Infinity);
    const m = higher ? Math.max(...vals) : Math.min(...vals.filter(v=>v>-Infinity));
    return vals.findIndex(v=>v===m);
  };

  const subsArr  = channels.map(c=>c.subs);
  const avgArr   = channels.map(c=>avgViews(c));
  const freqArr  = channels.map(c=>c.uploadFreqDays);
  const cntArr   = channels.map(c=>c.videoCount);

  const subsB  = best(subsArr);
  const avgB   = best(avgArr);
  const freqB  = best(freqArr, false); // lower = more frequent = better
  const cntB   = best(cntArr);

  const hues = [262, 155, 75];
  const colorsData = channels.map((_,i)=>`oklch(0.55 0.14 ${hues[i]||200})`);

  const thCol = channels.map((ch,i)=>`
    <th>
      <div class="cmp-ch-hd">
        <div class="cmp-av" style="background:${colorsData[i]}">
          ${ch.thumbUrl ? `<img src="${escAttr(ch.thumbUrl)}" alt=""/>` : esc(ch.name.slice(0,2))}
        </div>
        <div>
          <div class="cmp-ch-name">${esc(ch.name)}</div>
          <div style="font-size:10.5px;color:var(--ink-4);font-family:var(--mono)">${esc(ch.handle)}</div>
        </div>
      </div>
    </th>`).join('');

  const row = (label, vals, bestIdx, fmt) => `
    <tr>
      <td>${label}</td>
      ${vals.map((v,i)=>`<td class="${i===bestIdx&&v!=null?'cmp-best':''}">${fmt(v,i)}</td>`).join('')}
    </tr>`;

  const scoreRow = (label, vals, bestIdx) => `
    <tr>
      <td>${label}</td>
      ${vals.map((v,i)=>`<td>
        <div class="${i===bestIdx?'cmp-best':''}" style="font-weight:${i===bestIdx?700:400}">${v??'—'}</div>
        ${v!=null?`<div class="cmp-score-bar"><span style="width:${v}%;background:${colorsData[i]}"></span></div>`:''}
      </td>`).join('')}
    </tr>`;

  /* derived scores (seed-based consistency) */
  const scores = channels.map(ch => {
    const r = Gen.rng(Gen.hash('cmp-score:'+ch.id));
    return {
      content: Math.round(45 + r()*50),
      growth:  Math.round(35 + r()*55),
      engage:  Math.round(40 + r()*50),
    };
  });
  const contentB = best(scores.map(s=>s.content));
  const growthB  = best(scores.map(s=>s.growth));
  const engageB  = best(scores.map(s=>s.engage));

  /* top category per channel */
  const topCatRow = `
    <tr>
      <td>주력 카테고리</td>
      ${channels.map(ch=>`<td>${esc(ch.cats[0]?.[0]||'—')}</td>`).join('')}
    </tr>`;

  /* real/mock badge */
  const dataBadgeRow = `
    <tr>
      <td>데이터 출처</td>
      ${channels.map(ch=>`<td>${ch.isReal?'<span class="chip chip--ok" style="font-size:10px">실제</span>':'<span class="chip" style="font-size:10px">추정</span>'}</td>`).join('')}
    </tr>`;

  return `
    <div class="card" style="margin-bottom:18px">
      <div class="card__hd"><h3>채널 비교표</h3><span class="muted">수치 기준 가장 높은 항목 강조</span></div>
      <div class="cmp-wrap">
        <table class="cmp-table">
          <thead><tr><th>항목</th>${thCol}</tr></thead>
          <tbody>
            ${row('구독자', subsArr, subsB, v => v!=null ? Gen.viewStr(v) : '—')}
            ${row('총 조회수', channels.map(c=>c.totalViews), best(channels.map(c=>c.totalViews)), v => v!=null ? Gen.viewStr(v) : '—')}
            ${row('영상당 평균 조회', avgArr, avgB, v => v!=null ? Gen.viewStr(v) : '—')}
            ${row('영상 수', cntArr, cntB, v => v!=null ? v.toLocaleString() : '—')}
            ${row('업로드 주기', freqArr, freqB, v => freqLabel(v))}
            ${topCatRow}
            ${scoreRow('콘텐츠 점수 (추정)', scores.map(s=>s.content), contentB)}
            ${scoreRow('성장 가능성 (추정)', scores.map(s=>s.growth), growthB)}
            ${scoreRow('참여도 점수 (추정)', scores.map(s=>s.engage), engageB)}
            ${dataBadgeRow}
          </tbody>
        </table>
      </div>
    </div>

    <div class="grid-${Math.min(N,3)}" style="margin-bottom:18px; gap:16px; ${N===3?'grid-template-columns:repeat(3,1fr)':''}">
      ${channels.map((ch,i)=>`
        <div class="card">
          <div class="card__hd">
            <div class="cmp-av" style="background:${colorsData[i]}">
              ${ch.thumbUrl?`<img src="${escAttr(ch.thumbUrl)}" alt=""/>`:esc(ch.name.slice(0,2))}
            </div>
            <h3 style="font-size:13px">${esc(ch.name)}</h3>
          </div>
          <div class="catbar">
            ${ch.cats.slice(0,4).map(([name,pct])=>{
              const total = ch.cats.reduce((s,[,v])=>s+v,0)||1;
              const w = Math.round(pct/total*100);
              return `<div class="catbar__row">
                <div class="catbar__lbl">${esc(name)}</div>
                <div class="catbar__track"><div class="catbar__fill" style="width:${w}%;background:${colorsData[i]}"></div></div>
                <div class="catbar__pct">${w}%</div>
              </div>`;
            }).join('')}
          </div>
          <div style="margin-top:14px">
            <button class="btn" style="width:100%;height:36px" data-ch-detail="${i}">채널 상세 분석</button>
          </div>
        </div>`).join('')}
    </div>

    ${aiSectionSkeleton('cmpAi')}
  `;
}

              <div class="field__hint">꺼두면 모든 호출이 데모 데이터로 처리됩니다.</div>
            </div>

        <div style="display:flex; gap:8px">
          <button class="btn btn--primary" id="saveAi">저장</button>
          <button class="btn btn--danger" id="clearAi">키 삭제</button>
        </div>

        <div class="field__hint" style="margin-top:14px; padding:12px; background:var(--bg-sunken); border-radius:8px">
          <b style="color:var(--ink); font-weight:650">보안 안내</b><br/>
          키는 이 브라우저의 localStorage에만 저장됩니다. 공용 PC에서는 사용을 권장하지 않으며, 다른 사람과 화면을 공유할 때는 [표시]를 끄세요.
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card__hd"><h3>연결 상태</h3><span class="muted">현재 설정 요약</span></div>
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:14px">
        <div class="fc-cell">
          <div class="fc-cell__h">YouTube API</div>
          <div class="fc-cell__v" style="font-size:14px">${cfg.youtubeApiKey ? '<span style="color:var(--ok)">설정 완료</span>' : '<span style="color:var(--ink-3)">미설정</span>'}</div>
          <div class="fc-cell__r">${cfg.youtubeApiKey ? mask(cfg.youtubeApiKey) : '데모 데이터 사용 중'}</div>
        </div>
        <div class="fc-cell">
          <div class="fc-cell__h">AI API</div>
          <div class="fc-cell__v" style="font-size:14px">${cfg.aiApiKey ? '<span style="color:var(--ok)">설정 완료</span>' : '<span style="color:var(--ink-3)">미설정</span>'}</div>
          <div class="fc-cell__r">${cfg.aiApiKey ? `${cfg.aiProvider} · ${mask(cfg.aiApiKey)}` : '데모 데이터 사용 중'}</div>
        </div>
        <div class="fc-cell">
          <div class="fc-cell__h">실제 API 사용</div>
          <div class="fc-cell__v" style="font-size:14px">${cfg.useReal ? '<span style="color:var(--ok)">활성</span>' : '<span style="color:var(--ink-3)">비활성</span>'}</div>
          <div class="fc-cell__r">${cfg.useReal ? '키가 있으면 실호출' : '항상 데모 모드'}</div>
        </div>
      </div>

  `;

  // Toggle visibility
  const setEye = (input, btn) => {
    btn.addEventListener('click', () => {
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.textContent = showing ? '표시' : '가리기';
    });
  };
  setEye(document.getElementById('ytKey'), document.getElementById('ytToggle'));
  setEye(document.getElementById('aiKey'), document.getElementById('aiToggle'));

  document.getElementById('saveYt').addEventListener('click', () => {
    const k = document.getElementById('ytKey').value.trim();
    if (k && !/^AIza[0-9A-Za-z_-]{20,}$/.test(k)){
      if (!confirm('일반적인 YouTube API 키 형식(AIza...)이 아닙니다. 그래도 저장할까요?')) return;
    }
    SettingsCfg.save({ youtubeApiKey: k });
    App.setRegion(document.getElementById('defaultRegion').value);
    toast('YouTube 설정을 저장했습니다');
    renderSettings();
  });
  document.getElementById('clearYt').addEventListener('click', () => {
    SettingsCfg.save({ youtubeApiKey: '' }); toast('YouTube 키를 삭제했습니다'); renderSettings();
  });

  document.getElementById('saveAi').addEventListener('click', () => {
    const k = document.getElementById('aiKey').value.trim();
    const p = document.getElementById('aiProvider').value;
    SettingsCfg.save({ aiApiKey: k, aiProvider: p });
    toast('AI 설정을 저장했습니다');
    renderSettings();
  });
  document.getElementById('clearAi').addEventListener('click', () => {
    SettingsCfg.save({ aiApiKey: '' }); toast('AI 키를 삭제했습니다'); renderSettings();
  });

  const sw = document.getElementById('useRealSw');
  sw.addEventListener('click', () => {
    const next = !sw.classList.contains('is-on');
    sw.classList.toggle('is-on', next);
    SettingsCfg.save({ useReal: next });
    toast(next ? '실제 API 사용을 켰습니다 (키가 있으면 실호출)' : '데모 모드로 전환했습니다');
  });
}

/* ─────────────── Video Action Bar ─────────────── */
const VidRegistry = {};
function mockYtVidId(id){ return Gen.hash('ytv:'+id).toString(16).padStart(11,'0').slice(0,11); }

function vidActionBar(v, rowMode=false){
  const key = v.id || ('v_'+Gen.hash(v.title+':'+v.channel).toString(36));
  VidRegistry[key] = v;
  const ytVid = v.ytId || mockYtVidId(key);
  const chSlug = v.channel.replace(/\s+/g,'');
  const vidUrl = 'https://www.youtube.com/watch?v=' + ytVid;
  const chUrl  = 'https://www.youtube.com/@' + chSlug;
  const span   = rowMode ? ' style="grid-column:1/-1"' : '';
  return `<div class="vid-actions"${span} onclick="event.stopPropagation()">
    <button class="vab" data-va="summary" data-key="${escAttr(key)}">동영상 요약</button>
    <button class="vab" data-va="script"  data-key="${escAttr(key)}">스크립트 요약</button>
    <button class="vab" data-va="algo"    data-key="${escAttr(key)}">알고리즘 분석</button>
    <button class="vab" data-va="success" data-key="${escAttr(key)}">성공요인 분석</button>
    <button class="vab vab--copy" data-va="copyVid" data-url="${escAttr(vidUrl)}">영상 URL 복사</button>
    <button class="vab vab--copy" data-va="copyCh"  data-url="${escAttr(chUrl)}">채널 URL 복사</button>
  </div>`;
}

/* ─────────────── Modal ─────────────── */
const VidModal = {
  init(){
    document.getElementById('modalClose').addEventListener('click', ()=>this.close());
    document.getElementById('vidModal').addEventListener('click', e=>{ if(e.target===document.getElementById('vidModal')) this.close(); });
  },
  open(title, sub, html, ytId, searchUrl){
    let playerHtml;
    if (ytId) {
      // Real YouTube ID — embed and autoplay
      playerHtml = `<div class="modal-player">
        <iframe src="https://www.youtube.com/embed/${escAttr(ytId)}?autoplay=1&rel=0&modestbranding=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>`;
    } else if (searchUrl) {
      // Demo/mock video — show YouTube search link
      playerHtml = `<div class="modal-player">
        <a class="modal-player__link" href="${escAttr(searchUrl)}" target="_blank" rel="noopener noreferrer">
          <div class="modal-player__icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
          </div>
          <span>YouTube에서 이 영상 검색하기</span>
          <span class="modal-player__sub">데모 모드 · YouTube API 키 연결 시 바로 재생됩니다</span>
        </a>
      </div>`;
    } else {
      playerHtml = '';
    }
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalSub').textContent = sub||'';
    document.getElementById('modalBody').innerHTML = playerHtml + html;
    document.getElementById('vidModal').classList.add('is-open');
    document.body.style.overflow='hidden';
  },
  close(){
    // Stop video before hiding — clears iframe src so audio stops immediately
    const iframe = document.querySelector('#modalBody iframe');
    if (iframe) iframe.src = '';
    document.getElementById('vidModal').classList.remove('is-open');
    document.body.style.overflow='';
  }
};

function openVidModal(type, v){
  const r = Gen.rng(Gen.hash('modal:'+type+':'+v.id));
  const titles = { summary:'동영상 요약', script:'스크립트 요약', algo:'알고리즘 분석', success:'성공요인 분석' };
  const key = v.id || ('v_'+Gen.hash(v.title+':'+v.channel).toString(36));
  // Real YouTube ID only for real API results — mock IDs cannot embed
  const ytVid = (v.ytId && v.isReal) ? v.ytId : null;
  const searchUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(v.title);
  VidModal.open(titles[type]||type, v.title, genModalContent(type, v, r), ytVid, searchUrl);
}

function genModalContent(type, v, r){
  if (type==='summary')  return genVideoSummary(v, r);
  if (type==='script')   return genScriptSummary(v, r);
  if (type==='algo')     return genAlgoDetails(v, r);
  if (type==='success')  return genSuccessFactors(v, r);
  return '';
}

function genVideoSummary(v, r){
  const dur = Gen.durStr(v.durationSec);
  const tags = ['정보 전달형','엔터테인먼트','실용적','감성적','도전형','리뷰형','브이로그형','튜토리얼형'];
  const picked = tags.sort(()=>r()-0.5).slice(0,3);
  return `<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card" style="padding:16px">
      <div class="card__hd"><h3>영상 개요</h3></div>
      <div style="font-size:13.5px;line-height:1.65;display:flex;flex-direction:column;gap:8px">
        <p style="margin:0"><b>${esc(v.channel)}</b> 채널의 <b>${esc(v.category.name)}</b> 분야 콘텐츠입니다.</p>
        <p style="margin:0">총 ${dur} 길이로 업로드 ${v.publishedAgoH}시간 만에 <b>${Gen.viewStr(v.views)}</b>회 조회를 기록하고 있습니다.</p>
        <p style="margin:0">최근 24시간 동안 <b style="color:var(--ok)">+${Gen.viewStr(v.delta24h)}</b>회 증가한 것으로 추정되며, 알고리즘 노출 신호로 해석될 가능성이 있습니다.</p>
      </div>
    </div>
    <div class="scores" style="grid-template-columns:repeat(3,1fr)">
      <div class="score"><div class="score__hd">조회수</div><div class="score__num" style="font-size:20px">${Gen.viewStr(v.views)}</div><div class="score__note">전체 누적 추정</div></div>
      <div class="score"><div class="score__hd">24h 증가</div><div class="score__num" style="font-size:20px;color:var(--ok)">+${Gen.viewStr(v.delta24h)}</div><div class="score__note">급상승 신호</div></div>
      <div class="score"><div class="score__hd">가능성 점수</div><div class="score__num" style="font-size:20px">${v.score}</div><div class="score__note">/ 100</div></div>
    </div>
    <div class="card" style="padding:16px">
      <div class="card__hd"><h3>콘텐츠 특성 추정</h3></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${picked.map(t=>`<span class="chip chip--accent">${t}</span>`).join('')}</div>
      <p style="margin:0;font-size:12px;color:var(--ink-3)">제목·카테고리·길이 기반 AI 추정값입니다. 실제 영상 내용과 다를 수 있습니다.</p>
    </div>
  </div>`;
}

function genScriptSummary(v, r){
  const m = Math.floor(v.durationSec/60);
  const sections = [
    { t:`오프닝 (0:00 ~ 0:30)`, d:`"${esc(v.title)}"의 핵심 주제를 제시하며 시청자 이탈을 막는 후킹으로 시작하는 것으로 추정됩니다. 첫 30초의 이탈률이 낮을 가능성이 있습니다.` },
    { t:`도입부 (0:30 ~ ${Math.round(m*0.2)}:00)`, d:`주제의 배경과 맥락을 설명하는 구간입니다. 정보 밀도가 높고 자막·그래픽이 함께 활용될 가능성이 있습니다.` },
    { t:`본론 (${Math.round(m*0.2)}:00 ~ ${Math.round(m*0.7)}:00)`, d:`핵심 내용을 단계별로 풀어가며 시청자의 궁금증을 해소하는 구간입니다. 중간 이탈을 막기 위한 장치가 포함되어 있을 가능성이 있습니다.` },
    { t:`클라이맥스 (${Math.round(m*0.7)}:00 ~ ${Math.round(m*0.9)}:00)`, d:`영상의 핵심 장면·정보가 집중되는 구간으로 추정됩니다. 시청 유지율이 이 구간에서 상승할 가능성이 큽니다.` },
    { t:`마무리 & CTA (${Math.round(m*0.9)}:00 ~ ${m}:00)`, d:`핵심을 요약하고 구독·좋아요·다음 영상으로 이어지도록 유도하는 아웃트로 구간입니다.` },
  ];
  return `<div style="display:flex;flex-direction:column;gap:10px">
    <div style="padding:12px;background:var(--warn-soft);border-radius:var(--r-md);font-size:12px;color:oklch(0.42 0.13 75)">이 스크립트 요약은 제목·길이·카테고리를 기반으로 AI가 추정한 가상 구성입니다. 실제 스크립트와 다를 수 있습니다.</div>
    ${sections.map((s,i)=>`<div class="insight"><div class="insight__num">${i+1}</div><div><div class="insight__t">${s.t}</div><div class="insight__d">${s.d}</div></div></div>`).join('')}
    <div class="card" style="padding:14px">
      <div style="font-size:12.5px;color:var(--ink-3)"><b style="color:var(--ink)">핵심 키워드 추정:</b> <span style="margin-left:6px">${v.title.split(/\s+/).slice(0,5).map(w=>`<span class="chip" style="margin:0 2px 4px">${esc(w)}</span>`).join('')}</span></div>
    </div>
  </div>`;
}

function genAlgoDetails(v, r){
  const velScore = Math.min(100, Math.round((v.delta24h/Math.max(v.views,1))*200));
  const ctrGrade = v.ctr>=8?'우수':v.ctr>=5?'보통':'개선 필요';
  const retGrade = v.retention>=55?'우수':v.retention>=40?'보통':'개선 필요';
  const ctrColor = v.ctr>=8?'var(--ok)':v.ctr>=5?'var(--warn)':'var(--danger)';
  const retColor = v.retention>=55?'var(--ok)':v.retention>=40?'var(--warn)':'var(--danger)';
  return `<div style="display:flex;flex-direction:column;gap:14px">
    <div class="scores" style="grid-template-columns:repeat(2,1fr)">
      <div class="score"><div class="score__hd">CTR 추정</div><div class="score__num">${v.ctr}%<span style="font-size:11px;color:var(--ink-4)"> (${ctrGrade})</span></div><div class="score__bar"><span style="width:${Math.min(100,v.ctr*8)}%;background:${ctrColor}"></span></div><div class="score__note">노출 대비 클릭률 추정</div></div>
      <div class="score"><div class="score__hd">시청 유지율</div><div class="score__num">${v.retention}%<span style="font-size:11px;color:var(--ink-4)"> (${retGrade})</span></div><div class="score__bar"><span style="width:${v.retention}%;background:${retColor}"></span></div><div class="score__note">평균 시청 비율 추정</div></div>
      <div class="score"><div class="score__hd">속도 지수</div><div class="score__num">${velScore}<span style="font-size:11px;color:var(--ink-4)"> / 100</span></div><div class="score__bar"><span style="width:${velScore}%;background:var(--accent)"></span></div><div class="score__note">24h 상승 속도 추정</div></div>
      <div class="score"><div class="score__hd">종합 가능성</div><div class="score__num">${v.score}<span style="font-size:11px;color:var(--ink-4)"> / 100</span></div><div class="score__bar"><span style="width:${v.score}%;background:var(--accent)"></span></div><div class="score__note">알고리즘 신호 종합</div></div>
    </div>
    <div class="card" style="padding:16px">
      <div class="card__hd"><h3>알고리즘 신호 해석</h3></div>
      <div class="insight-list">
        ${[
          {t:'초반 노출 신호', d:`발행 후 ${v.publishedAgoH}시간 만에 ${Gen.viewStr(v.views)} 조회로 ${v.publishedAgoH<6?'빠른 초반 노출 신호가 감지됩니다':'안정적인 성장세가 관측됩니다'}.`},
          {t:'CTR 품질', d:`${v.ctr}% CTR은 ${ctrGrade} 수준으로, 썸네일과 제목의 조합이 클릭 유도에 ${v.ctr>=7?'효과적으로 보입니다':'개선 여지가 있을 수 있습니다'}.`},
          {t:'유지율 영향', d:`${v.retention}% 유지율은 알고리즘의 콘텐츠 품질 평가에 ${v.retention>=50?'긍정적으로 작용할 가능성이 큽니다':'영향을 줄 수 있으며 인트로 최적화가 필요합니다'}.`},
        ].map((it,i)=>`<div class="insight"><div class="insight__num">${i+1}</div><div><div class="insight__t">${it.t}</div><div class="insight__d">${it.d}</div></div></div>`).join('')}
      </div>
    </div>
  </div>`;
}

function genSuccessFactors(v, r){
  const factors = [
    {t:'제목 효과성', score:55+Math.round(r()*40), d:`제목 길이(${v.title.length}자)와 키워드 배치가 검색·클릭 유도에 영향을 줄 가능성이 있습니다.`},
    {t:'업로드 타이밍', score:50+Math.round(r()*45), d:`${v.publishedAgoH}시간 전 업로드로 초반 4시간 골든타임을 활용했을 가능성이 있습니다.`},

/* ─────────────── Trending Topics ─────────────── */
async function fetchRealTrendingTopics(region){
  const cfg = SettingsCfg.load();
  if (cfg.useReal && cfg.youtubeApiKey){
    try {
      const videos = await API.trending({ region, window:'24h' });
      if (videos && videos.length){
        return videos.slice(0,10).map((v,i) => {
          const growthPct = Math.round(Math.min(999, (v.delta24h / Math.max(v.views,1)) * 100 * 10));
          const rk = Gen.rng(Gen.hash('rtk:'+v.id));
          return {
            rank: i+1,
            keyword: v.title,
            score: v.score,
            growth: Math.max(5, growthPct),
            category: v.category,
            isReal: true,
            desc: `${v.channel} 채널의 실제 급상승 영상입니다. 조회수 ${Gen.viewStr(v.views)} · 24시간 ${Gen.viewStr(v.delta24h)} 증가 · ${v.category.name} 분야.`,
            prediction: `1M후 ${Math.min(98, Math.round(v.score + rk()*12 - 4))}점 추정`,
          };
        });
      }
    } catch(e){ toast('토픽 로딩 오류: '+e.message); }
  }
  return genTrendingTopics(region);
}

function genTrendingTopics(region){
  const r = Gen.rng(Gen.hash('tk:'+region+':'+new Date().toDateString()));
  const pool = [
    '미니멀 캠핑','하루 한 끼 단백질','자취 인테리어','월배당 포트폴리오','로컬 디저트',
    'AI 사이드잡','1인 콘텐츠 창작','소형 주택 생활','디지털 노마드','홈 카페 루틴',
    '저예산 해외여행','무자본 창업','퇴사 후 삶','맨몸 운동 루틴','미래 직업 트렌드',
    '레트로 브이로그','독서 챌린지','제로웨이스트','재테크 입문','언어 교환 루틴',
  ];
  return pool.sort(()=>r()-0.5).slice(0,10).map((kw,i)=>{
    const rk = Gen.rng(Gen.hash('tkd:'+kw));
    const score   = Math.round(58 + rk()*38);
    const growth  = Math.round(18 + rk()*77);
    const cat     = Gen.CATEGORIES[Math.floor(rk()*Gen.CATEGORIES.length)];
    const persons = ['20대 직장인','30대 자영업자','대학생','주부','프리랜서'];
    const person  = persons[Math.floor(rk()*persons.length)];
    return {
      rank: i+1, keyword: kw, score, growth, category: cat,
      desc: `'${kw}'은(는) ${cat.name} 영역에서 최근 ${growth}% 상승 신호가 감지되고 있습니다. 특히 ${person} 시청자층에서 강한 관심을 보이는 경향이 있습니다.`,
      prediction: `1M후 ${Math.min(98,Math.round(score + rk()*12 - 4))}점 추정`,
    };
  });
}

/* ─────────────── URL Analysis ─────────────── */
function parseYtId(url){
  try {
    const u = new URL(url.startsWith('http')?url:'https://'+url);
    if (u.hostname.includes('youtu.be')) return u.pathname.slice(1);
    return u.searchParams.get('v') || null;
  } catch { return null; }
}

function parseChannelId(urlOrHandle){
  const s = (urlOrHandle||'').trim();
  if (!s) return null;
  let m;
  if ((m = s.match(/youtube\.com\/channel\/(UC[\w-]+)/i))) return { type:'id', value:m[1] };
  if ((m = s.match(/youtube\.com\/@([\w.-]+)/i))) return { type:'handle', value:'@'+m[1] };
  if ((m = s.match(/youtube\.com\/(?:c\/|user\/)([\w.-]+)/i))) return { type:'custom', value:m[1] };
  if ((m = s.match(/^@([\w.-]+)$/))) return { type:'handle', value:s };
  if ((m = s.match(/^(UC[\w-]{20,})$/))) return { type:'id', value:s };
  return null;
}

function genUrlSuccessReport(url, rv=null){
  const ytId = parseYtId(url);
  const seed = ytId || url;
  const r = Gen.rng(Gen.hash('url_s:'+seed));

  const views     = rv?.views       ?? Math.round(50000 + r()*8000000);
  const likes     = rv?.likes       ?? Math.round(views*(0.02+r()*0.05));
  const dur       = rv?.durationSec ?? Math.round(120+r()*1800);
  const cat       = rv?.category    ?? Gen.CATEGORIES[Math.floor(r()*Gen.CATEGORIES.length)];
  const title     = rv?.title       ?? null;
  const channel   = rv?.channel     ?? null;
  const thumbUrl  = rv?.thumb?.url  ?? null;
  const pubAgoH   = rv?.publishedAgoH ?? null;
  const ctr       = rv?.ctr         ?? +(2+r()*11).toFixed(1);
  const retention = rv?.retention   ?? +(25+r()*55).toFixed(1);
  const score     = Math.min(99, Math.round(ctr*4 + retention*0.7 + Math.log10(Math.max(views,1))*3));

  const factors = [
    { t:'제목 효과성', score:50+Math.round(r()*45),
      d: title
        ? `"${title.slice(0,28)}${title.length>28?'…':''}" (${title.length}자) — ${title.length<=45?'적정 길이로 CTR에 긍정적으로 작용할 가능성이 있습니다':'제목이 길어 모바일에서 잘릴 가능성이 있습니다'}.`
        : '제목의 키워드 구성과 감성 어휘가 클릭 유도에 영향을 줄 가능성이 있습니다.' },
    { t:'썸네일 품질', score:45+Math.round(r()*50),
      d:'썸네일 내 텍스트 가독성·인물 유무·색상 대비가 CTR에 복합 작용할 가능성이 있습니다.' },
    { t:'업로드 타이밍', score:40+Math.round(r()*55),
      d: pubAgoH
        ? `업로드 ${pubAgoH}시간 전 — 발행 직후 4시간의 CTR이 알고리즘 신호로 작용할 가능성이 큽니다.`
        : '업로드 시점의 경쟁 환경과 시청자 활성도가 초반 노출에 영향을 줄 가능성이 있습니다.' },
    { t:'콘텐츠 길이 적합도', score:45+Math.round(r()*50),
      d:`${Gen.durStr(dur)} — 이 카테고리에서 ${r()>0.5?'적합한':'개선 여지가 있는'} 수준으로 관측됩니다.` },
    { t:'카테고리 권위', score:50+Math.round(r()*45),
      d:'채널이 해당 카테고리를 얼마나 일관되게 다뤘는지가 알고리즘 신뢰도에 영향을 줄 가능성이 있습니다.' },
    { t:'시청자 반응 유도', score:45+Math.round(r()*50),
      d: (rv && likes)
        ? `좋아요 ${Gen.viewStr(likes)}개 (조회수 대비 ${(likes/Math.max(views,1)*100).toFixed(1)}%) — 참여율 신호로 작용할 가능성이 있습니다.`
        : '좋아요·댓글·공유 등 반응 신호를 유도하는 CTA 설계가 성과에 영향을 줄 가능성이 있습니다.' },
  ];
  return { ytId, views, ctr, retention, dur, likes, score, cat, factors,
           title, channel, thumbUrl, pubAgoH, isReal:!!rv };
}

function genUrlAlgoReport(url, rv=null){
  const ytId = parseYtId(url);
  const seed = ytId || url;
  const r = Gen.rng(Gen.hash('url_a:'+seed));

  const views     = rv?.views       ?? Math.round(50000 + r()*8000000);
  const likes     = rv?.likes       ?? null;
  const dur       = rv?.durationSec ?? null;
  const pubAgoH   = rv?.publishedAgoH ?? null;
  const title     = rv?.title       ?? null;
  const channel   = rv?.channel     ?? null;
  const thumbUrl  = rv?.thumb?.url  ?? null;
  const ctr       = rv?.ctr         ?? +(2+r()*11).toFixed(1);
  const retention = rv?.retention   ?? +(25+r()*55).toFixed(1);
  const vel       = Math.min(100, Math.round(r()*80));
  const score     = Math.min(99, Math.round(ctr*4 + retention*0.7 + Math.log10(Math.max(views,1))*3));

  const algoFactors = [
    { t:'클릭률(CTR)', w:22, score:Math.round(Math.min(100,ctr*7)),
      d:`추정 CTR ${ctr}%는 ${ctr>=7?'우수 수준으로 알고리즘 추천 확장 신호가 강합니다':'개선이 필요합니다. 썸네일·제목을 점검해보세요'}.` },
    { t:'평균 시청 시간(AVD)', w:20, score:Math.round(40+r()*50),
      d: dur ? `영상 길이 ${Gen.durStr(dur)} 기준 시청 시간 비율이 콘텐츠 품질 신호로 작용합니다.`
             : `영상 길이 대비 실제 시청 시간 비율이 콘텐츠 품질 신호로 작용합니다.` },
    { t:'시청 유지율', w:18, score:Math.round(Math.min(100,retention)),
      d:`추정 유지율 ${retention}%로 인트로 30초 이탈 곡선이 핵심입니다.` },
    { t:'세션 체류', w:14, score:Math.round(40+r()*50),
      d:`영상 종료 후 플랫폼 이탈 여부가 채널 신뢰도에 누적될 가능성이 있습니다.` },
    { t:'반응 신호', w:10, score:Math.round(45+r()*50),
      d: likes ? `좋아요 ${Gen.viewStr(likes)}개 — 조회수 대비 ${(likes/Math.max(views,1)*100).toFixed(1)}% 참여율이 주제 권위로 누적될 가능성이 있습니다.`
               : `좋아요·댓글 흐름이 주제 권위로 누적될 가능성이 있습니다.` },
    { t:'신선도', w:8, score:Math.round(40+r()*55),
      d: pubAgoH ? `업로드 ${pubAgoH}시간 전 — 발행 직후 가속 구간 성과가 장기 노출량을 결정할 가능성이 큽니다.`
                 : `발행 직후 가속 구간 성과가 장기 노출량을 결정할 가능성이 큽니다.` },
    { t:'채널 주제 권위', w:8, score:Math.round(55+r()*40),
      d: channel ? `${channel} 채널이 이 주제를 일관되게 다뤄왔는지가 경쟁 채널 대비 우선 노출에 영향을 줍니다.`
                 : `채널이 이 주제를 일관되게 다뤄왔는지가 경쟁 채널 대비 우선 노출에 영향을 줍니다.` },
  ];
  return { ytId, views, ctr, retention, vel, score, algoFactors,
           title, channel, thumbUrl, pubAgoH, likes, isReal:!!rv };
}

function scoreColor(s){ if (s >= 70) return 'var(--ok)'; if (s >= 50) return 'var(--accent)'; if (s >= 35) return 'var(--warn)'; return 'var(--danger)'; }
function verdict(s){ if (s >= 75) return '강한 상승 가능성'; if (s >= 60) return '상승 신호 누적'; if (s >= 45) return '관망 가능'; return '신호 약함'; }
function riskLabel(l){ return l==='high'?'주의 가능성':l==='med'?'보통':'낮음'; }
function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s){ return esc(s); }
function timeAgo(ts){
  const d = Date.now() - ts; const m = Math.floor(d/60000);
  if (m < 1) return '방금';
  if (m < 60) return `${m}분 전`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h}시간 전`;
  const day = Math.floor(h/24);
  if (day < 7) return `${day}일 전`;
  return new Date(ts).toLocaleDateString('ko-KR');
}
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('is-show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=> el.classList.remove('is-show'), 1800);
}
function updateNavCounts(){ document.getElementById('navHistCount').textContent = API.history.list().length; }

/* ─────────────── Bootstrap ─────────────── */
function bootstrap(){
  // Region dropdown
  const regionMenu = document.getElementById('regionMenu');
  regionMenu.innerHTML = Gen.COUNTRIES.map(c => {
    const tc = Gen.thumbColors('flag:'+c.code);
    return `<div class="menu__item ${c.code===App.region?'is-active':''}" data-code="${c.code}">
      <div class="ctry-iso" style="--g1:${tc.g1}; --g2:${tc.g2}; width:28px; height:20px; border-radius:4px; font-size:9.5px">${c.code}</div>
      <div>${c.name}</div>
    </div>`;
  }).join('');
  const regionBtn = document.getElementById('regionBtn');
  regionBtn.addEventListener('click', e => { e.stopPropagation(); regionMenu.classList.toggle('is-open'); });
  document.addEventListener('click', () => regionMenu.classList.remove('is-open'));
  regionMenu.addEventListener('click', e => {
    const item = e.target.closest('.menu__item'); if (!item) return;
    App.setRegion(item.dataset.code);
    regionMenu.classList.remove('is-open');
    regionMenu.querySelectorAll('.menu__item').forEach(x => x.classList.toggle('is-active', x.dataset.code===item.dataset.code));
  });
  const c0 = Gen.COUNTRIES.find(x=>x.code===App.region) || Gen.COUNTRIES[0];
  document.getElementById('regionIso').textContent = c0.code;
  document.getElementById('regionName').textContent = c0.name;
  App.region = c0.code;

  // Nav
  document.querySelectorAll('.nav__item[data-view]').forEach(el => {
    el.addEventListener('click', () => {
      App.go(el.dataset.view);
      document.getElementById('sb').classList.remove('is-open');
      document.getElementById('scrim').classList.remove('is-show');
    });
  });
  document.querySelector('[data-action="reset"]').addEventListener('click', () => {
    if (confirm('저장된 모든 분석 기록을 삭제합니다 (API 키는 유지됩니다). 계속할까요?')){
      API.history.clear(); updateNavCounts(); toast('데이터가 초기화되었습니다'); App.go('home');
    }
  });
  document.getElementById('hdSettings').addEventListener('click', () => App.go('settings'));

  // Brand button → home
  document.getElementById('brandBtn').addEventListener('click', () => App.go('home'));

  // Mobile
  document.getElementById('burger').addEventListener('click', () => { document.getElementById('sb').classList.add('is-open'); document.getElementById('scrim').classList.add('is-show'); });
  document.getElementById('scrim').addEventListener('click', () => { document.getElementById('sb').classList.remove('is-open'); document.getElementById('scrim').classList.remove('is-show'); });

  // Top search
  const top = document.getElementById('topSearch');
  top.addEventListener('keydown', e => { if (e.key === 'Enter' && top.value.trim()){ App.analyzeAndShow(top.value.trim()); top.blur(); } });

  // Modal init
  VidModal.init();

  // Global action button handler — capture phase so stopPropagation on .vid-actions doesn't block it
  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-va]');
    if (!btn) return;
    e.stopPropagation(); // prevent [data-kw] bubble handlers from also firing
    const va = btn.dataset.va;
    if (va === 'copyVid' || va === 'copyCh'){
      const url = btn.dataset.url;
      const fallback = () => { try{ const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta); }catch(err){} };
      if (navigator.clipboard) navigator.clipboard.writeText(url).then(()=>toast('URL이 클립보드에 복사되었습니다')).catch(()=>{ fallback(); toast('URL이 클립보드에 복사되었습니다'); });
      else { fallback(); toast('URL이 클립보드에 복사되었습니다'); }
      return;
    }
    const v = VidRegistry[btn.dataset.key];
    if (!v) return;
    openVidModal(va, v);
  }, { capture: true });

  // Video card/row click → open player modal (capture phase, before bubble [data-kw] handlers)
  document.addEventListener('click', e => {
    if (e.target.closest('[data-va]')) return; // action buttons handled separately
    if (e.target.closest('.modal-player__link')) return; // YouTube search link — let browser navigate
    const card = e.target.closest('[data-vplay]');
    if (!card) return;
    e.stopPropagation(); // prevent per-page [data-kw] bubble handlers from also firing
    const v = VidRegistry[card.dataset.vplay];
    if (!v) return;
    openVidModal('summary', v);
  }, { capture: true });

  // ESC key closes modal
  document.addEventListener('keydown', e => { if (e.key==='Escape') VidModal.close(); });

  // 설정 뱃지 초기화
  SettingsCfg.save({}); // triggers badge sync

  updateNavCounts();
  render();
}
document.addEventListener('DOMContentLoaded', bootstrap);
</script>
