<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SignalMap AI — 유튜브 트렌드 시그널</title>
<style>
  /* =========================================================
     Design tokens (자체 디자인 시스템 — 외부 브랜드 비참조)
     ========================================================= */
  :root{
    --bg:           oklch(0.985 0.004 255);
    --bg-elev:      #ffffff;
    --bg-sunken:    oklch(0.965 0.005 255);
    --line:         oklch(0.92 0.006 255);
    --line-strong:  oklch(0.86 0.008 255);
    --ink:          oklch(0.22 0.012 260);
    --ink-2:        oklch(0.38 0.012 260);
    --ink-3:        oklch(0.55 0.010 260);
    --ink-4:        oklch(0.70 0.008 260);
    --accent:       oklch(0.56 0.16 262);
    --accent-soft:  oklch(0.94 0.04 262);
    --accent-ink:   oklch(0.32 0.12 262);
    --accent-2:     oklch(0.60 0.14 200);
    --ok:           oklch(0.63 0.12 155);
    --ok-soft:      oklch(0.94 0.05 155);
    --warn:         oklch(0.70 0.14 75);
    --warn-soft:    oklch(0.95 0.06 75);
    --danger:       oklch(0.60 0.18 25);
    --danger-soft:  oklch(0.95 0.05 25);

    --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 22px;
    --sb-w: 252px; --hd-h: 64px;

    --shadow-sm: 0 1px 2px rgba(20,24,40,.04), 0 1px 1px rgba(20,24,40,.03);
    --shadow-md: 0 6px 24px -10px rgba(20,24,40,.12), 0 2px 6px rgba(20,24,40,.04);

    --font: system-ui,-apple-system,"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Segoe UI",Roboto,sans-serif;
    --mono: ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font); color:var(--ink); background:var(--bg); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; letter-spacing:-0.005em}
  button{font-family:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
  input,select,textarea{font-family:inherit;color:inherit}
  a{color:inherit;text-decoration:none}

  /* App shell */
  .app{display:grid; grid-template-columns: var(--sb-w) 1fr; grid-template-rows: var(--hd-h) 1fr; grid-template-areas:"sb hd""sb main"; min-height:100vh}
  .sb{grid-area:sb; background:var(--bg-elev); border-right:1px solid var(--line); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; z-index:30}
  .sb__brand{display:flex; align-items:center; gap:10px; padding:18px 20px; border-bottom:1px solid var(--line); height:var(--hd-h)}
  .sb__mark{width:28px; height:28px; border-radius:8px; background: linear-gradient(135deg, var(--accent), oklch(0.45 0.2 285)); position:relative; flex:none}
  .sb__mark::after{content:""; position:absolute; inset:6px; border-radius:3px; background:radial-gradient(circle at 30% 30%, #fff 0 1.5px, transparent 2px),radial-gradient(circle at 70% 60%, #fff 0 1.5px, transparent 2px),radial-gradient(circle at 50% 80%, #fff 0 1.5px, transparent 2px)}
  .sb__title{font-weight:650; font-size:14.5px; letter-spacing:-0.01em}
  .sb__sub{font-size:11px; color:var(--ink-3); margin-top:1px}
  .sb__nav{padding:14px 12px; display:flex; flex-direction:column; gap:2px; flex:1; overflow-y:auto}
  .sb__group{font-size:10.5px; font-weight:600; color:var(--ink-4); letter-spacing:0.08em; text-transform:uppercase; padding:14px 10px 6px}
  .nav__item{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--r-sm); color:var(--ink-2); font-size:13.5px; font-weight:500; cursor:pointer; transition: background .12s ease, color .12s ease}
  .nav__item:hover{background:var(--bg-sunken); color:var(--ink)}
  .nav__item.is-active{background:var(--accent-soft); color:var(--accent-ink); font-weight:600}
  .nav__ic{width:18px; height:18px; flex:none; color:currentColor}
  .nav__count{margin-left:auto; font-size:11px; color:var(--ink-4); font-variant-numeric:tabular-nums}
  .nav__item.is-active .nav__count{color:var(--accent-ink)}
  .nav__badge{margin-left:auto; font-size:10px; padding:2px 6px; border-radius:99px; background:var(--warn-soft); color:oklch(0.42 0.13 75); font-weight:700}
  .sb__foot{padding:14px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px}
  .avatar{width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg, oklch(0.7 0.12 200), oklch(0.55 0.16 262)); color:#fff; font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center; flex:none}
  .sb__user{font-size:12.5px; font-weight:600}
  .sb__plan{font-size:11px; color:var(--ink-3)}

  /* Header */
  .hd{grid-area:hd; background:var(--bg-elev); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px; padding:0 24px; position:sticky; top:0; z-index:20; height:var(--hd-h)}
  .hd__burger{display:none}
  .hd__search{flex:1; max-width:640px; position:relative}
  .hd__search input{width:100%; height:40px; background:var(--bg-sunken); border:1px solid transparent; border-radius:10px; padding:0 12px 0 38px; font-size:13.5px; outline:none; transition: background .12s, border-color .12s, box-shadow .12s}
  .hd__search input::placeholder{color:var(--ink-4)}
  .hd__search input:focus{background:#fff; border-color:var(--accent); box-shadow: 0 0 0 4px var(--accent-soft)}
  .hd__search .hd__ic{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--ink-4)}
  .hd__kbd{position:absolute; right:10px; top:50%; transform:translateY(-50%); font-family:var(--mono); font-size:10.5px; color:var(--ink-3); background:#fff; border:1px solid var(--line); border-radius:4px; padding:2px 6px}
  .hd__spacer{flex:1}
  .hd__actions{display:flex; gap:8px; align-items:center}
  .region-pick{display:flex; align-items:center; gap:8px; height:38px; padding:0 12px; border-radius:10px; background:var(--bg-sunken); color:var(--ink-2); font-size:12.5px; font-weight:600; cursor:pointer}
  .region-pick:hover{background:var(--bg); outline:1px solid var(--line)}
  .region-pick .iso{font-family:var(--mono); font-size:10.5px; background:#fff; padding:2px 5px; border-radius:4px; border:1px solid var(--line); color:var(--ink); font-weight:700}
  .icon-btn{width:38px; height:38px; border-radius:10px; background:var(--bg-sunken); display:flex; align-items:center; justify-content:center; color:var(--ink-2); position:relative}
  .icon-btn:hover{background:var(--bg); outline:1px solid var(--line)}
  .icon-btn .dot{position:absolute; top:9px; right:10px; width:7px; height:7px; border-radius:50%; background:var(--danger); border:2px solid var(--bg-elev)}

  /* Main */
  .main{grid-area:main; padding:28px 32px 64px; max-width:1480px}
  .page-head{margin-bottom:24px; display:flex; align-items:end; gap:16px; flex-wrap:wrap}
  .page-head h1{font-size:22px; font-weight:680; margin:0; letter-spacing:-0.015em}
  .page-head p{margin:4px 0 0; color:var(--ink-3); font-size:13px}
  .page-head__actions{margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap}

  /* Reusable */
  .card{background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--r-lg); padding:20px}
  .card--inset{padding:0}
  .card__hd{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap}
  .card__hd h3{margin:0; font-size:14px; font-weight:650}
  .card__hd .muted{color:var(--ink-3); font-size:12px}
  .card__hd .right{margin-left:auto; display:flex; align-items:center; gap:8px}
  .btn{display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 14px; border-radius:9px; font-size:13px; font-weight:600; background:var(--bg-elev); color:var(--ink-2); border:1px solid var(--line); transition: background .12s, border-color .12s, transform .04s}
  .btn:hover{background:var(--bg-sunken); color:var(--ink)}
  .btn:active{transform:translateY(1px)}
  .btn--primary{background:var(--ink); color:#fff; border-color:var(--ink)}
  .btn--primary:hover{background:#000; color:#fff}
  .btn--accent{background:var(--accent); color:#fff; border-color:var(--accent)}
  .btn--accent:hover{background:oklch(0.5 0.17 262); color:#fff}
  .btn--ghost{background:transparent; border-color:transparent}
  .btn--ghost:hover{background:var(--bg-sunken)}
  .btn--danger{color:var(--danger); border-color:var(--line)}
  .btn--danger:hover{background:var(--danger-soft); color:var(--danger); border-color:var(--danger-soft)}
  .btn--sm{height:30px; padding:0 10px; font-size:12px; border-radius:7px}
  .chip{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:99px; font-size:11.5px; font-weight:600; background:var(--bg-sunken); color:var(--ink-2); border:1px solid var(--line)}
  .chip--accent{background:var(--accent-soft); color:var(--accent-ink); border-color:transparent}
  .chip--ok{background:var(--ok-soft); color:oklch(0.4 0.13 155); border-color:transparent}
  .chip--warn{background:var(--warn-soft); color:oklch(0.42 0.13 75); border-color:transparent}
  .chip--danger{background:var(--danger-soft); color:oklch(0.42 0.16 25); border-color:transparent}
  .pill{display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:600; font-variant-numeric:tabular-nums}
  .pill--up{color:oklch(0.4 0.13 155); background:var(--ok-soft)}
  .pill--down{color:oklch(0.42 0.16 25); background:var(--danger-soft)}
  .pill--flat{color:var(--ink-3); background:var(--bg-sunken)}
  .tabs{display:flex; gap:4px; padding:4px; background:var(--bg-sunken); border-radius:10px; align-self:flex-start; max-width:100%; overflow-x:auto; scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:6px 12px; border-radius:7px; font-size:12.5px; font-weight:600; color:var(--ink-3); cursor:pointer; white-space:nowrap}
  .tab.is-active{background:#fff; color:var(--ink); box-shadow:var(--shadow-sm)}

  /* Stats */
  .stats{display:grid; gap:14px; grid-template-columns: repeat(4, minmax(0,1fr)); margin-bottom:22px}
  .stat{background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--r-lg); padding:18px; position:relative; overflow:hidden}
  .stat__label{font-size:12px; color:var(--ink-3); font-weight:550}
  .stat__value{font-size:26px; font-weight:680; margin-top:6px; letter-spacing:-0.02em; font-variant-numeric:tabular-nums}
  .stat__meta{margin-top:8px; display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--ink-3)}

  /* Hero */
  .hero{border:1px solid var(--line); background:radial-gradient(80% 100% at 100% 0%, oklch(0.96 0.04 262) 0%, transparent 60%), linear-gradient(180deg, #fff, var(--bg-elev)); border-radius:var(--r-xl); padding:28px; margin-bottom:22px; position:relative; overflow:hidden}
  .hero__eyebrow{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; color:var(--accent-ink); background:#fff; border:1px solid var(--line); padding:4px 10px; border-radius:99px}
  .hero h2{margin:14px 0 6px; font-size:26px; font-weight:680; letter-spacing:-0.02em; max-width:620px}
  .hero p{margin:0; color:var(--ink-3); font-size:13.5px; max-width:560px}
  .hero__form{margin-top:20px; display:flex; gap:8px; max-width:700px}
  .hero__form input{flex:1; height:48px; border-radius:12px; border:1px solid var(--line); background:#fff; padding:0 16px; font-size:14px; outline:none; transition: border-color .12s, box-shadow .12s}
  .hero__form input:focus{border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft)}
  .hero__form button{height:48px; padding:0 22px; border-radius:12px; background:var(--ink); color:#fff; font-weight:650; font-size:13.5px; display:flex; align-items:center; gap:6px}
  .hero__form button:hover{background:#000}
  .hero__sugs{margin-top:14px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; color:var(--ink-3); font-size:12px}
  .hero__sugs button{font-size:12px; padding:4px 10px; border-radius:99px; background:#fff; border:1px solid var(--line); color:var(--ink-2); font-weight:550}
  .hero__sugs button:hover{border-color:var(--accent); color:var(--accent-ink)}
  .hero__deco{position:absolute; right:-40px; top:-40px; width:240px; height:240px; background: conic-gradient(from 200deg, transparent, var(--accent-soft), transparent 60%); border-radius:50%; filter: blur(20px); pointer-events:none; opacity:.7}

  /* Thumb */
  .thumb{position:relative; width:100%; aspect-ratio: 16/9; border-radius:10px; overflow:hidden; background: linear-gradient(135deg, var(--g1, oklch(0.7 0.12 260)), var(--g2, oklch(0.55 0.16 220)))}
  .thumb::before{content:""; position:absolute; inset:0; background:repeating-linear-gradient(135deg, rgba(255,255,255,.08) 0 2px, transparent 2px 14px)}
  .thumb--real::before{display:none}
  .thumb__play{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:42px; height:42px; border-radius:50%; background:rgba(0,0,0,.45); backdrop-filter: blur(2px); display:flex; align-items:center; justify-content:center; color:#fff}
  .thumb__dur{position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,.7); color:#fff; font-size:10.5px; font-variant-numeric:tabular-nums; font-weight:600; padding:2px 6px; border-radius:4px}
  .thumb__rank{position:absolute; top:8px; left:8px; background:rgba(0,0,0,.7); color:#fff; font-size:10.5px; font-weight:700; font-variant-numeric:tabular-nums; padding:2px 7px; border-radius:99px}
  .thumb__cat{position:absolute; top:8px; right:8px; background:rgba(255,255,255,.92); color:var(--ink); font-size:10.5px; font-weight:650; padding:2px 7px; border-radius:99px}

  /* Video grid (card 스타일) */
  .vid-grid{display:grid; gap:16px; grid-template-columns: repeat(auto-fill, minmax(240px,1fr))}
  .vid-card{
    display:flex; flex-direction:column; gap:0;
    background:var(--bg-elev); border:1px solid var(--line);
    border-radius:var(--r-lg); overflow:hidden;
    cursor:pointer;
    transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
  }
  .vid-card:hover{
    transform: translateY(-2px);
    border-color:var(--line-strong);
    box-shadow: var(--shadow-md);
  }
  .vid-card .thumb{border-radius:0}
  .vid-card__body{padding:12px 14px 14px; display:flex; flex-direction:column; gap:6px}
  .vid-card__t{font-weight:650; font-size:13.5px; line-height:1.45; text-wrap:pretty; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:39px}
  .vid-card__ch{font-size:12px; color:var(--ink-3); font-weight:550; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .vid-card__meta{display:flex; gap:6px; align-items:center; font-size:11.5px; color:var(--ink-3); flex-wrap:wrap}
  .vid-card__metric{font-variant-numeric:tabular-nums; font-weight:600; color:var(--ink-2)}
  .vid-card__foot{
    display:flex; align-items:center; gap:6px;
    padding:10px 14px; border-top:1px solid var(--line);
    background:var(--bg-sunken);
    font-size:11px; color:var(--ink-3);
  }
  .vid-card__foot b{color:var(--ink); font-variant-numeric:tabular-nums; font-weight:700; font-size:12.5px}
  .vid-card__score{
    margin-left:auto;
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 8px; border-radius:99px;
    background:var(--accent-soft); color:var(--accent-ink);
    font-size:11px; font-weight:700; font-variant-numeric:tabular-nums;
  }

  /* Video row (card 스타일) */
  .vid-list{display:flex; flex-direction:column; gap:10px}
  .vid-row{
    display:grid; grid-template-columns: 36px 180px 1fr auto;
    gap:14px; align-items:center; padding:12px;
    background:var(--bg-elev); border:1px solid var(--line);
    border-radius:var(--r-lg);
    cursor:pointer;
    transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
  }
  .vid-row:hover{
    transform: translateY(-1px);
    border-color:var(--line-strong);
    box-shadow: var(--shadow-md);
  }
  .vid-row__rk{font-size:14px; font-weight:700; color:var(--ink-3); font-variant-numeric:tabular-nums; text-align:center}
  .vid-row__rk--top{color:var(--accent-ink)}
  .vid-row__thumb{width:180px; flex:none}
  .vid-row__main{min-width:0}
  .vid-row__t{font-weight:650; font-size:14px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .vid-row__ch{font-size:12px; color:var(--ink-3); margin-top:3px}
  .vid-row__tags{margin-top:6px; display:flex; gap:6px; flex-wrap:wrap}
  .vid-row__metrics{display:grid; grid-template-columns: repeat(3, minmax(80px,1fr)); gap:14px; text-align:right}
  .met__l{font-size:10.5px; color:var(--ink-4); font-weight:600; letter-spacing:0.04em; text-transform:uppercase}
  .met__v{font-size:14px; font-weight:700; font-variant-numeric:tabular-nums; margin-top:2px}
  .met__s{font-size:10.5px; color:var(--ink-3); margin-top:1px}

  /* Country */
  .ctry-grid{display:grid; gap:12px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr))}
  .ctry-card{background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--r-lg); padding:14px; display:flex; flex-direction:column; gap:10px; cursor:pointer; transition: border-color .12s}
  .ctry-card:hover{border-color:var(--line-strong)}
  .ctry-card__hd{display:flex; align-items:center; gap:10px}
  .ctry-iso{width:34px; height:24px; border-radius:5px; background:linear-gradient(135deg, var(--g1), var(--g2)); color:#fff; font-family:var(--mono); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex:none; letter-spacing:0.05em}
  .ctry-card__name{font-weight:650; font-size:13.5px}
  .ctry-card__lang{font-size:11px; color:var(--ink-3)}
  .ctry-top{font-size:12px; color:var(--ink-2); font-weight:600; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.4; min-height:34px}
  .ctry-stats{display:flex; gap:14px; padding-top:8px; border-top:1px dashed var(--line); font-size:11.5px; color:var(--ink-3)}
  .ctry-stats b{display:block; color:var(--ink); font-size:14px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1.1}

  /* Analysis */
  .res-head{display:flex; align-items:flex-start; gap:18px; flex-wrap:wrap; padding:24px; border:1px solid var(--line); background:var(--bg-elev); border-radius:var(--r-xl); margin-bottom:18px}
  .res-head__main{flex:1; min-width:220px}
  .res-head__kw{font-size:30px; font-weight:700; letter-spacing:-0.02em; margin:6px 0 4px}
  .res-head__meta{display:flex; gap:8px; flex-wrap:wrap; color:var(--ink-3); font-size:12.5px}
  .res-head__score{display:flex; align-items:center; gap:18px; padding:8px 18px; border-left:1px solid var(--line)}
  .gauge{width:96px; height:96px; position:relative; flex:none}
  .gauge svg{transform:rotate(-90deg)}
  .gauge__val{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; font-variant-numeric:tabular-nums}
  .gauge__num{font-size:24px; font-weight:700; letter-spacing:-0.02em}
  .gauge__sub{font-size:10px; color:var(--ink-3); margin-top:-2px}
  .scores{display:grid; gap:14px; grid-template-columns: repeat(4, minmax(0,1fr)); margin-bottom:18px}
  .score{background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--r-lg); padding:18px}
  .score__hd{display:flex; align-items:center; gap:8px; color:var(--ink-3); font-size:12px; font-weight:550}
  .score__num{margin-top:8px; font-size:28px; font-weight:700; letter-spacing:-0.02em; font-variant-numeric:tabular-nums}
  .score__bar{margin-top:10px; height:6px; background:var(--bg-sunken); border-radius:99px; overflow:hidden}
  .score__bar span{display:block; height:100%; border-radius:99px}
  .score__note{margin-top:8px; font-size:11.5px; color:var(--ink-3)}
  .grid-2{display:grid; grid-template-columns: 1.6fr 1fr; gap:18px; margin-bottom:18px}
  .grid-2-eq{display:grid; grid-template-columns: 1fr 1fr; gap:18px; margin-bottom:18px}
  .chart-wrap{position:relative}
  .chart-wrap svg{display:block; width:100%; height:auto; overflow:visible}
  .chart-legend{display:flex; gap:14px; font-size:11.5px; color:var(--ink-3); margin-top:6px; flex-wrap:wrap}
  .chart-legend span{display:inline-flex; align-items:center; gap:6px}
  .chart-legend i{width:10px; height:2px; border-radius:99px; display:inline-block}
  .forecast-stats{display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top:14px}
  .fc-cell{background:var(--bg-sunken); border-radius:var(--r-md); padding:12px}
  .fc-cell__h{font-size:11px; color:var(--ink-3); font-weight:550}
  .fc-cell__v{font-size:18px; font-weight:680; margin-top:2px; letter-spacing:-0.01em; font-variant-numeric:tabular-nums}
  .fc-cell__r{font-size:11px; color:var(--ink-3); margin-top:2px}
  .ideas{display:flex; flex-direction:column; gap:10px}
  .idea{border:1px solid var(--line); border-radius:var(--r-md); padding:14px; background:#fff; display:grid; grid-template-columns: 32px 1fr auto; gap:12px; align-items:flex-start}
  .idea__ic{width:32px; height:32px; border-radius:9px; background:var(--accent-soft); color:var(--accent-ink); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px}
  .idea__t{font-weight:650; font-size:13.5px}
  .idea__d{color:var(--ink-3); font-size:12.5px; margin-top:3px; line-height:1.55}
  .idea__tags{margin-top:8px; display:flex; gap:6px; flex-wrap:wrap}
  .idea__rt{font-size:11px; color:var(--ink-3); white-space:nowrap}

  /* Success */
  .dist{display:flex; align-items:flex-end; gap:4px; height:120px; padding:8px 0}
  .dist__bar{flex:1; min-width:0; background:var(--accent-soft); border-radius:5px 5px 2px 2px; position:relative; transition: background .12s}
  .dist__bar.is-peak{background:var(--accent)}
  .dist__bar:hover{background:var(--accent-ink)}
  .dist__axis{display:flex; justify-content:space-between; font-size:10.5px; color:var(--ink-4); margin-top:6px}
  .heatmap{display:grid; grid-template-columns: 28px repeat(24, 1fr); gap:2px; font-size:10px}
  .heatmap__lbl{color:var(--ink-4); font-weight:600; line-height:18px}
  .heatmap__cell{aspect-ratio:1; border-radius:3px; background:var(--bg-sunken)}
  .heatmap__hours{display:grid; grid-template-columns: 28px repeat(24, 1fr); gap:2px; font-size:9.5px; color:var(--ink-4); margin-top:4px; font-variant-numeric:tabular-nums}
  .heatmap__hours span{text-align:center}
  .insight-list{display:flex; flex-direction:column; gap:10px}
  .insight{display:flex; align-items:flex-start; gap:12px; padding:14px; border:1px solid var(--line); border-radius:var(--r-md); background:#fff}
  .insight__num{width:24px; height:24px; border-radius:6px; background:var(--ink); color:#fff; font-weight:700; font-size:11px; display:flex; align-items:center; justify-content:center; flex:none; font-variant-numeric:tabular-nums}
  .insight__t{font-weight:650; font-size:13px}
  .insight__d{color:var(--ink-3); font-size:12.5px; margin-top:3px; line-height:1.55}

  /* Algorithm */
  .factor{display:grid; grid-template-columns: 1fr auto; gap:8px; padding:14px 0; border-bottom:1px solid var(--line)}
  .factor:last-child{border-bottom:0}
  .factor__hd{display:flex; align-items:center; gap:8px}
  .factor__t{font-weight:650; font-size:13.5px}
  .factor__w{font-size:11.5px; color:var(--ink-3)}
  .factor__bar{grid-column: 1 / -1; height:8px; background:var(--bg-sunken); border-radius:99px; overflow:hidden; margin-top:4px; position:relative}
  .factor__bar > i{display:block; height:100%; background:var(--accent); border-radius:99px}
  .factor__d{grid-column: 1 / -1; font-size:12px; color:var(--ink-3); margin-top:6px; line-height:1.55}
  .factor__val{font-variant-numeric:tabular-nums; font-weight:700; font-size:14px}

  /* History */
  .hist-grid{display:grid; gap:12px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr))}
  .hist-card{background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--r-lg); padding:16px; display:flex; flex-direction:column; gap:8px; transition: border-color .12s}
  .hist-card:hover{border-color:var(--line-strong)}
  .hist-card__hd{display:flex; align-items:center; gap:8px}
  .hist-card__kw{font-weight:680; font-size:15px; letter-spacing:-0.01em}
  .hist-card__time{font-size:11px; color:var(--ink-4)}
  .hist-card__scores{display:grid; grid-template-columns: repeat(4,1fr); gap:6px; margin-top:4px}
  .hist-card__s{font-size:11px; color:var(--ink-3); text-align:center}
  .hist-card__s b{display:block; font-size:14px; color:var(--ink); font-weight:700; font-variant-numeric:tabular-nums}
  .hist-card__act{display:flex; gap:6px; margin-top:auto; padding-top:8px}
  .empty{text-align:center; padding:48px 20px; color:var(--ink-3); border:1px dashed var(--line); border-radius:var(--r-lg); background:#fff}
  .empty h4{margin:6px 0 4px; color:var(--ink); font-size:15px}
  .empty p{margin:0; font-size:12.5px}

  /* Settings */
  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:18px}
  .field__lbl{font-size:12.5px; font-weight:650}
  .field__hint{font-size:11.5px; color:var(--ink-3)}
  .field__row{display:flex; gap:8px; align-items:stretch}
  .field__input{
    flex:1; height:40px; border-radius:9px; padding:0 12px; font-size:13px;
    border:1px solid var(--line); background:#fff; outline:none; font-family:var(--mono);
    transition: border-color .12s, box-shadow .12s;
  }
  .field__input:focus{border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft)}
  .field__input.is-saved{background:var(--ok-soft); border-color:transparent}
  .field__state{font-size:11px; color:var(--ink-3); display:flex; align-items:center; gap:6px}
  .field__state.is-ok{color:oklch(0.45 0.13 155)}
  .field__state.is-warn{color:oklch(0.5 0.15 75)}
  .switch{display:inline-flex; align-items:center; gap:10px; cursor:pointer; padding:8px 0}
  .switch__track{width:36px; height:20px; background:var(--bg-sunken); border-radius:99px; position:relative; transition:background .15s}
  .switch__track::after{content:""; position:absolute; left:2px; top:2px; width:16px; height:16px; background:#fff; border-radius:50%; box-shadow: 0 1px 3px rgba(0,0,0,.15); transition: transform .15s}
  .switch.is-on .switch__track{background:var(--accent)}
  .switch.is-on .switch__track::after{transform:translateX(16px)}
  .switch__lbl{font-size:13px; font-weight:600}

  /* Toast & skeleton */
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink); color:#fff; padding:10px 16px; border-radius:99px; font-size:12.5px; font-weight:600; box-shadow:var(--shadow-md); opacity:0; transition: opacity .15s, transform .2s; z-index:200; pointer-events:none}
  .toast.is-show{opacity:1; transform:translateX(-50%) translateY(0)}
  .skeleton{background:linear-gradient(90deg, var(--bg-sunken) 0%, oklch(0.93 0.006 255) 50%, var(--bg-sunken) 100%); background-size:200% 100%; animation: shimmer 1.2s linear infinite; border-radius:8px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Region menu */
  .menu{position:absolute; top:calc(100% + 6px); right:0; background:#fff; border:1px solid var(--line); border-radius:var(--r-md); box-shadow:var(--shadow-md); min-width:220px; max-height:340px; overflow:auto; z-index:50; padding:6px; opacity:0; pointer-events:none; transform: translateY(-4px); transition: opacity .12s, transform .12s}
  .menu.is-open{opacity:1; pointer-events:auto; transform: translateY(0)}
  .menu__item{display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:7px; cursor:pointer; font-size:13px}
  .menu__item:hover{background:var(--bg-sunken)}
  .menu__item.is-active{background:var(--accent-soft); color:var(--accent-ink); font-weight:600}

  /* Category section header (trending grouped) */
  .cat-sec{margin-bottom:32px}
  .cat-sec__hd{display:flex; align-items:end; gap:10px; margin-bottom:14px; flex-wrap:wrap}
  .cat-sec__t{font-size:18px; font-weight:680; letter-spacing:-0.015em; margin:0}
  .cat-sec__sub{font-size:12px; color:var(--ink-3)}
  .cat-sec__more{margin-left:auto}

  /* Responsive */
  @media (max-width: 1100px){
    .stats{grid-template-columns: repeat(2, 1fr)}
    .scores{grid-template-columns: repeat(2, 1fr)}
    .grid-2,.grid-2-eq{grid-template-columns: 1fr}
    .vid-row{grid-template-columns: 28px 160px 1fr}
    .vid-row__metrics{display:none}
  }
  @media (max-width: 860px){
    :root{--sb-w: 0px}
    .app{grid-template-columns: 0 1fr}
    .sb{position:fixed; left:0; top:0; bottom:0; width:280px; transform:translateX(-100%); transition:transform .22s ease; box-shadow:var(--shadow-md)}
    .sb.is-open{transform:translateX(0)}
    .hd__burger{display:flex; width:38px; height:38px; border-radius:10px; background:var(--bg-sunken); align-items:center; justify-content:center}
    .hd{padding:0 14px; gap:10px}
    .main{padding:18px 14px 48px}
    .hd__kbd{display:none}
    .region-pick span:not(.iso){display:none}
    .scores{grid-template-columns: 1fr 1fr}
    .res-head__score{border-left:0; padding-left:0}
    .page-head h1{font-size:19px}
    .hero{padding:22px}
    .hero h2{font-size:21px}
    .hero__form{flex-direction:column}
    .hero__form button{width:100%; justify-content:center}
    .scrim{position:fixed; inset:0; background:rgba(15,18,30,.4); z-index:25; opacity:0; pointer-events:none; transition:opacity .2s}
    .scrim.is-show{opacity:1; pointer-events:auto}
    .vid-row{grid-template-columns: 1fr}
    .vid-row__thumb{width:100%; max-width:none}
    .vid-row__rk{display:none}
  }
  @media (max-width: 480px){
    .stats{grid-template-columns: 1fr 1fr}
    .scores{grid-template-columns: 1fr 1fr}
    .res-head__kw{font-size:24px}
  }
  /* Vid action bar */
  .vid-actions{display:flex;flex-wrap:wrap;gap:5px;padding:10px 12px 12px;border-top:1px solid var(--line);background:var(--bg-sunken)}
  .vab{display:inline-flex;align-items:center;gap:4px;height:26px;padding:0 9px;border-radius:6px;font-size:11px;font-weight:600;background:#fff;color:var(--ink-2);border:1px solid var(--line);cursor:pointer;white-space:nowrap;transition:background .1s,color .1s,border-color .1s}
  .vab:hover{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}
  .vab--copy:hover{background:var(--ok-soft);color:oklch(0.4 0.13 155);border-color:transparent}
  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(15,18,30,.52);z-index:150;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .18s}
  .modal-bg.is-open{opacity:1;pointer-events:auto}
  .modal-box{background:#fff;border-radius:var(--r-xl);box-shadow:0 24px 80px rgba(15,18,30,.22);width:100%;max-width:900px;max-height:92vh;overflow:auto;transform:translateY(10px);transition:transform .18s;display:flex;flex-direction:column}
  .modal-bg.is-open .modal-box{transform:translateY(0)}
  .modal-hd{display:flex;align-items:flex-start;gap:12px;padding:18px 22px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:1}
  .modal-hd__t{font-size:15px;font-weight:700;flex:1;letter-spacing:-0.01em}
  .modal-hd__s{font-size:12px;color:var(--ink-3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .modal-hd__x{width:30px;height:30px;border-radius:8px;background:var(--bg-sunken);display:flex;align-items:center;justify-content:center;color:var(--ink-3);flex:none;cursor:pointer;border:0}
  .modal-hd__x:hover{background:var(--line-strong)}
  .modal-bd{padding:20px 22px 24px}
  .modal-player{position:relative;padding-top:56.25%;border-radius:10px;overflow:hidden;background:#0f0f0f;margin-bottom:18px}
  .modal-player iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
  .modal-player__link{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:oklch(0.14 0.02 262);color:#fff;font-size:13.5px;font-weight:600;gap:10px;text-decoration:none;transition:background .15s}
  .modal-player__link:hover{background:oklch(0.2 0.04 262)}
  .modal-player__icon{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center}
  .modal-player__sub{font-size:11.5px;font-weight:400;color:rgba(255,255,255,.6);margin-top:2px}
  /* Topic grid */
  .topic-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .topic-card{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
  .topic-card:hover{border-color:var(--line-strong);box-shadow:var(--shadow-sm)}
  .topic-card__hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .topic-card__rank{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
  .topic-card__t{font-weight:650;font-size:13.5px;letter-spacing:-0.01em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topic-card__desc{font-size:12px;color:var(--ink-3);line-height:1.55;margin-bottom:8px}
  .topic-card__bar{height:4px;background:var(--bg-sunken);border-radius:99px;overflow:hidden}
  .topic-card__bar span{display:block;height:100%;background:var(--accent);border-radius:99px}
  .topic-card__foot{display:flex;gap:6px;align-items:center;margin-top:8px;font-size:11px;color:var(--ink-3)}

  /* Channel Analysis & Compare */
  .ch-hero{display:flex;gap:20px;align-items:center;background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;margin-bottom:18px;flex-wrap:wrap}
  .ch-avatar{width:72px;height:72px;border-radius:50%;flex:none;background:linear-gradient(135deg,var(--accent),oklch(0.45 0.2 285));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0}
  .ch-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .ch-hero__info{flex:1;min-width:200px}
  .ch-hero__name{font-size:20px;font-weight:700;letter-spacing:-0.015em;margin:0 0 4px}
  .ch-hero__handle{font-size:12.5px;color:var(--ink-3);font-family:var(--mono)}
  .ch-hero__desc{font-size:12.5px;color:var(--ink-3);margin-top:8px;line-height:1.5;max-width:560px}
  .ch-hero__badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .ch-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .ch-stat{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--r-md);padding:14px 16px}
  .ch-stat__l{font-size:11.5px;color:var(--ink-3);margin-bottom:4px}
  .ch-stat__v{font-size:20px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
  .ch-stat__s{font-size:11px;color:var(--ink-4);margin-top:2px}
  .catbar{display:flex;flex-direction:column;gap:8px}
  .catbar__row{display:flex;align-items:center;gap:8px}
  .catbar__lbl{width:90px;font-size:11.5px;color:var(--ink-3);text-align:right;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .catbar__track{flex:1;height:8px;background:var(--bg-sunken);border-radius:99px;overflow:hidden}
  .catbar__fill{height:100%;border-radius:99px;background:var(--accent)}
  .catbar__pct{width:36px;font-size:11px;color:var(--ink-4);font-variant-numeric:tabular-nums;text-align:right}
  .cmp-wrap{overflow-x:auto}
  .cmp-table{width:100%;border-collapse:collapse;min-width:500px}
  .cmp-table th{font-size:11.5px;font-weight:650;color:var(--ink-3);padding:10px 14px;border-bottom:2px solid var(--line);white-space:nowrap;text-align:center}
  .cmp-table th:first-child{text-align:left;width:140px}
  .cmp-table td{padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle;text-align:center}
  .cmp-table td:first-child{text-align:left;color:var(--ink-3);font-size:12px;font-weight:600}
  .cmp-table tr:last-child td{border-bottom:0}
  .cmp-best{font-weight:700;color:oklch(0.45 0.13 155)}
  .cmp-ch-hd{display:flex;align-items:center;gap:8px;padding:8px 0;text-align:left}
  .cmp-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;overflow:hidden;flex:none}
  .cmp-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .cmp-ch-name{font-size:12.5px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch-input-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .ch-input-idx{font-size:12px;color:var(--ink-4);font-weight:600;width:20px;flex:none;text-align:center}
  .ch-remove-btn{background:var(--bg-sunken);border:1px solid var(--line);border-radius:6px;cursor:pointer;color:var(--ink-4);padding:0 8px;height:40px;font-size:18px;line-height:1;transition:background .1s,color .1s}
  .ch-remove-btn:hover{background:var(--danger-soft);color:var(--danger);border-color:transparent}
  .cmp-score-bar{height:6px;background:var(--bg-sunken);border-radius:99px;overflow:hidden;margin-top:4px}
  .cmp-score-bar span{display:block;height:100%;border-radius:99px}

  /* AI Insight */
  .ai-section{border:1.5px solid oklch(0.87 0.06 262);border-radius:var(--r-lg);padding:20px;background:linear-gradient(145deg,oklch(0.975 0.012 262) 0%,#fff 100%);margin-bottom:18px}
  .ai-section__hd{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .ai-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:10.5px;font-weight:700;background:linear-gradient(135deg,oklch(0.88 0.08 295),oklch(0.85 0.09 250));color:#fff;letter-spacing:0.02em}
  .ai-section__t{font-size:14px;font-weight:700;color:var(--ink)}
  .ai-section__sub{font-size:12px;color:var(--ink-3);margin-left:auto}
  .ai-summary{font-size:13.5px;color:var(--ink-2);line-height:1.7;margin-bottom:16px;padding:14px 16px;background:#fff;border-radius:10px;border:1px solid var(--line)}
  .ai-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:860px){.ai-cols{grid-template-columns:1fr}}
  .ai-col__t{font-size:11.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
  .ai-opp{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:12.5px;line-height:1.5;color:var(--ink-2)}
  .ai-opp:last-child{border-bottom:0;padding-bottom:0}
  .ai-opp::before{content:"✦";color:oklch(0.55 0.13 155);font-size:10px;margin-top:3px;flex:none}
  .ai-action{display:flex;align-items:flex-start;gap:8px;padding:9px;border-radius:8px;background:#fff;border:1px solid var(--line);margin-bottom:6px;font-size:12.5px;color:var(--ink-2);line-height:1.5}
  .ai-action:last-child{margin-bottom:0}
  .ai-action__num{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;margin-top:1px}
  .ai-idea-card{padding:10px 12px;border-radius:8px;border:1px solid var(--line);background:#fff;margin-bottom:6px}
  .ai-idea-card:last-child{margin-bottom:0}
  .ai-idea-card__t{font-size:13px;font-weight:650;margin-bottom:4px}
  .ai-idea-card__d{font-size:12px;color:var(--ink-3);line-height:1.5}
  .ai-idea-card__fmt{display:inline-block;margin-top:5px;font-size:10.5px;padding:2px 7px;border-radius:99px;background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
</style>
</head>
<body>

<div class="app">
  <aside class="sb" id="sb">
    <div class="sb__brand" style="cursor:pointer" id="brandBtn">
      <div class="sb__mark" aria-hidden="true"></div>
      <div>
        <div class="sb__title">YouTube Trend Report</div>
        <div class="sb__sub">유튜브 트렌드 분석</div>
      </div>
    </div>
    <nav class="sb__nav" id="nav">
      <div class="sb__group">탐색</div>
      <div class="nav__item is-active" data-view="home">
        <svg class="nav__ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>홈 대시보드</span>
      </div>

<script>
/* =============================================================
   SignalMap AI — 유튜브 트렌드 시그널 MVP
   ──────────────────────────────────────────────────────────────
   레이어:
     Store     localStorage (히스토리·국가·API 설정)
     API       외부 호출 추상 (mock → fetch 교체 지점)
     Gen       결정론적 더미 데이터 생성기
     Settings  YouTube/AI API key 저장 + 적용 토글
     App       라우터·전역 상태
     Views     화면별 렌더
   ============================================================= */

/* ───────── Store ───────── */
const Store = {
  ns: 'signalmap.v3.',
  read(k, def){ try{ const v = localStorage.getItem(this.ns+k); return v ? JSON.parse(v) : def; }catch(e){ return def; } },
  write(k, v){ try{ localStorage.setItem(this.ns+k, JSON.stringify(v)); }catch(e){} }
};

/* ───────── Settings ─────────
   실제 서비스에서 fetch에 사용할 키를 보관.
   현재는 mock 단계라 저장 자체만 수행 (네트워크 호출 안 함).
*/
const SettingsCfg = {
  defaults: {
    youtubeApiKey: '',
    aiApiKey: '',
    aiProvider: 'auto', // 'auto'|'openai'|'anthropic'|'gemini'
    useReal: false
  },
  load(){ return { ...this.defaults, ...Store.read('config', {}) }; },
  save(patch){
    const next = { ...this.load(), ...patch };
    Store.write('config', next);
    document.getElementById('navSettingsBadge').textContent = next.useReal ? '연결' : '데모';
    document.getElementById('navSettingsBadge').style.background = next.useReal ? 'var(--ok-soft)' : 'var(--warn-soft)';
    document.getElementById('navSettingsBadge').style.color     = next.useReal ? 'oklch(0.42 0.13 155)' : 'oklch(0.42 0.13 75)';
    return next;
  }
};

/* ───────── API LAYER ─────────
   useReal=true + youtubeApiKey 설정 시 YouTube Data API v3 실제 호출.
   오류 발생 시 toast 알림 후 mock 데이터로 자동 폴백.
*/
const API = (() => {
  const wait = (ms) => new Promise(r => setTimeout(r, ms));
  const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));

  /* 5분 TTL 인메모리 캐시 */
  const _cache = new Map();
  function cacheFetch(key, fn, ttl=300_000){
    const hit = _cache.get(key);
    if (hit && Date.now() - hit.ts < ttl) return Promise.resolve(hit.val);
    return fn().then(val => { _cache.set(key, { val, ts:Date.now() }); return val; });
  }

  /* ISO 8601 duration → seconds */
  function parseDur(iso){
    if (!iso) return 0;
    const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return 0;
    return (+(m[1]||0))*3600 + (+(m[2]||0))*60 + (+(m[3]||0));
  }

  /* published ISO string → hours ago */
  function hoursAgo(dt){ return Math.max(1, Math.round((Date.now()-new Date(dt).getTime())/3_600_000)); }

  /* YouTube categoryId → app cat id */
  const YT_TO_APP = {
    '1':'enter','2':'auto','10':'music','15':'pet','17':'sport',
    '19':'travel','20':'game','22':'vlog','23':'enter','24':'enter',
    '25':'news','26':'beauty','27':'edu','28':'tech','29':'news'
  };
  /* app cat id → YouTube categoryId */
  const APP_TO_YT = {
    music:'10',game:'20',enter:'24',news:'25',edu:'27',
    tech:'28',sport:'17',beauty:'26',food:'22',auto:'2',
    pet:'15',travel:'19',vlog:'22',finance:'25'
  };

  const CATS_LOOKUP = [
    {id:'music',name:'음악'},{id:'game',name:'게임'},{id:'enter',name:'엔터테인먼트'},
    {id:'news',name:'뉴스'},{id:'edu',name:'교육'},{id:'tech',name:'과학·기술'},
    {id:'sport',name:'스포츠'},{id:'beauty',name:'뷰티·패션'},{id:'food',name:'푸드'},
    {id:'auto',name:'자동차'},{id:'pet',name:'반려동물'},{id:'travel',name:'여행'},
    {id:'vlog',name:'브이로그'},{id:'finance',name:'경제·재테크'}
  ];

  /* YouTube API item → app video object */
  function ytItemToVideo(item, rank){
    const s  = item.snippet         || {};
    const st = item.statistics      || {};
    const cd = item.contentDetails  || {};
    const catId  = YT_TO_APP[s.categoryId] || 'enter';
    const cat    = CATS_LOOKUP.find(c=>c.id===catId) || CATS_LOOKUP[2];
    const views      = +(st.viewCount  || 0);
    const likes      = +(st.likeCount  || 0);
    const durationSec = parseDur(cd.duration);
    const pubAgoH    = hoursAgo(s.publishedAt);

    /* CTR / retention 비공개 → seed 기반 추정 */
    const seed = Gen.hash('yt:'+item.id);
    const r    = Gen.rng(seed);
    const ctr       = +(2 + r()*9).toFixed(1);
    const retention = +(28 + r()*48).toFixed(1);
    const avd       = Math.round(durationSec * (retention/100));
    const delta24h  = Math.round(views * (0.05 + r()*0.2));
    const score = clamp(Math.round(ctr*4 + retention*0.7 + Math.log10(Math.max(views,1))*3 + (delta24h/Math.max(views,1))*40), 30, 99);

    const thumbs = s.thumbnails || {};
    const thumbUrl = (thumbs.maxres||thumbs.high||thumbs.medium||thumbs.default||{}).url || null;

    return {
      id: item.id, ytId: item.id, isReal: true,
      title:   s.title        || '(제목 없음)',
      channel: s.channelTitle || '알 수 없음',
      category: cat,
      views, likes, ctr, retention, avd, durationSec,
      publishedAgoH: pubAgoH, delta24h, score, rank,
      thumb: thumbUrl ? { url: thumbUrl } : Gen.thumbColors(item.id)
    };
  }

  /* OpenAI Chat Completions fetch */
  async function openAiFetch(apiKey, messages, model='gpt-4o-mini'){
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
      body: JSON.stringify({ model, messages, max_tokens:900, temperature:0.7 })
    });
    if (!res.ok){
      const txt = await res.text().catch(()=>'');
      let msg = `HTTP ${res.status}`;
      try { const j=JSON.parse(txt); msg=j.error?.message||msg; } catch(_){}
      throw new Error(msg);
    }
    const json = await res.json();
    return json.choices?.[0]?.message?.content || '';
  }

  /* 인증된 YouTube Data API fetch */
  async function ytFetch(path, key){
    const sep = path.includes('?') ? '&' : '?';
    const url = `https://www.googleapis.com/youtube/v3/${path}${sep}key=${encodeURIComponent(key)}`;
    const res = await fetch(url);
    if (!res.ok){
      const txt = await res.text().catch(()=>'');
      let msg = `HTTP ${res.status}`;
      try { const j=JSON.parse(txt); msg=j.error?.message||msg; } catch(_){}
      throw new Error(msg);
    }
    return res.json();
  }

  async function _fetchYouTubeTrending(opts){
    const cfg = SettingsCfg.load();
    if (!cfg.useReal || !cfg.youtubeApiKey) return null;
    const region = opts.region || 'KR';
    const catId  = opts.category && opts.category!=='all' ? APP_TO_YT[opts.category] : '';
    const cacheKey = `trend:${region}:${catId}`;
    return cacheFetch(cacheKey, async () => {
      const params = `videos?part=snippet,statistics,contentDetails&chart=mostPopular&regionCode=${region}&maxResults=50${catId?'&videoCategoryId='+catId:''}`;
      const json = await ytFetch(params, cfg.youtubeApiKey);
      return (json.items||[]).map((item,i)=>ytItemToVideo(item,i+1));
    });
  }

  async function _fetchYouTubeTrendingByCategory(opts){
    const cfg = SettingsCfg.load();
    if (!cfg.useReal || !cfg.youtubeApiKey) return null;
    const region = opts.region || 'KR';
    const cacheKey = `trendByCat:${region}`;
    return cacheFetch(cacheKey, async () => {
      const cats = CATS_LOOKUP.filter(c=>APP_TO_YT[c.id]);
      const results = await Promise.allSettled(cats.map(async c => {
        const ytCatId = APP_TO_YT[c.id];
        const params = `videos?part=snippet,statistics,contentDetails&chart=mostPopular&regionCode=${region}&videoCategoryId=${ytCatId}&maxResults=10`;
        const json = await ytFetch(params, cfg.youtubeApiKey);
        const vids = (json.items||[]).map((item,i)=>ytItemToVideo(item,i+1));
        return { category:c, videos:vids };
      }));
      return results.filter(r=>r.status==='fulfilled'&&r.value.videos.length).map(r=>r.value);
    });
  }

  async function _fetchYouTubeCountries(key){
    const codes = Gen.COUNTRIES.map(c=>c.code);
    const cacheKey = 'countries';
    return cacheFetch(cacheKey, async () => {
      const results = await Promise.allSettled(codes.map(async code => {
        const params = `videos?part=snippet,statistics,contentDetails&chart=mostPopular&regionCode=${code}&maxResults=10`;
        const json = await ytFetch(params, key);
        return { code, videos:(json.items||[]).map((item,i)=>ytItemToVideo(item,i+1)) };
      }));
      const byCode = {};
      results.filter(r=>r.status==='fulfilled').forEach(r=>{ byCode[r.value.code]=r.value.videos; });
      return Gen.COUNTRIES.map(c => ({
        ...c,
        topVideo: byCode[c.code]?.[0] || null,
        videos:   byCode[c.code] || [],
        risingCount: byCode[c.code]?.length || 0,
        hotCategory: byCode[c.code]?.[0]?.category?.name || '—',
        thumb: Gen.thumbColors('flag:'+c.code)
      }));
    });
  }

  return {
    async summary(region){
      const cfg = SettingsCfg.load();
      if (cfg.useReal && cfg.youtubeApiKey){
        try {
          const real = await _fetchYouTubeTrending({ region, window:'24h' });
          if (real && real.length){
            const r = Gen.rng(Gen.hash('sm:'+region+':'+new Date().toDateString()));
            return {
              totalTracked: 8200 + Math.floor(r()*1800),
              risingNow:    real.length,
              topCategory:  real[0]?.category?.name || '—',
              avgCtr:       +(real.reduce((s,v)=>s+v.ctr,0)/real.length).toFixed(1),
              top: real.slice(0,8)
            };
          }
        } catch(e){ toast('YouTube API 오류: '+e.message); }
      }
      await wait(80);
      return Gen.summary(region);
    },

    async trending(opts){
      const cfg = SettingsCfg.load();
      if (cfg.useReal && cfg.youtubeApiKey){
        try {
          const real = await _fetchYouTubeTrending(opts);
          if (real && real.length) return real;
        } catch(e){ toast('YouTube API 오류: '+e.message); }
      }
      await wait(160);
      return Gen.trending(opts);
    },

    async trendingByCategory(opts){
      const cfg = SettingsCfg.load();
      if (cfg.useReal && cfg.youtubeApiKey){
        try {
          const real = await _fetchYouTubeTrendingByCategory(opts);
          if (real && real.length) return real;
        } catch(e){ toast('YouTube API 오류: '+e.message); }
      }
      await wait(120);
      return Gen.trendingByCategory(opts);
    },

    async countries(){
      const cfg = SettingsCfg.load();
      if (cfg.useReal && cfg.youtubeApiKey){
        try {
          const real = await _fetchYouTubeCountries(cfg.youtubeApiKey);
          if (real && real.length) return real;
        } catch(e){ toast('YouTube API 오류: '+e.message); }
      }
      await wait(60);
      return Gen.countries();
    },

    async analyze(keyword){
      await wait(420);
      return Gen.analysis(keyword.trim());
    },
    async videoById(videoId){
      const cfg = SettingsCfg.load();
      if (!cfg.useReal || !cfg.youtubeApiKey) return null;
      try {
        const json = await ytFetch(
          `videos?part=snippet,statistics,contentDetails&id=${encodeURIComponent(videoId)}`,
          cfg.youtubeApiKey
        );
        const item = (json.items||[])[0];
        return item ? ytItemToVideo(item, 1) : null;
      } catch(e){ toast('YouTube API 오류: '+e.message); return null; }
    },
    /* ── 공통 AI 호출 헬퍼 ── */
    async _ai(sysPrompt, userPrompt){
      const cfg = SettingsCfg.load();
      if (!cfg.aiApiKey) return null;
      try {
        const txt = await openAiFetch(cfg.aiApiKey, [
          { role:'system', content: sysPrompt },
          { role:'user',   content: userPrompt }
        ]);
        const m = txt.match(/\{[\s\S]*\}/);
        if (!m) throw new Error('JSON 형식 응답 없음');
        return JSON.parse(m[0]);
      } catch(e){ toast('AI 오류: '+e.message); return null; }
    },

    async aiHomeBriefing(topVideos, regionName){
      const titles = topVideos.slice(0,6).map((v,i)=>`${i+1}. [${v.category.name}] ${v.title} (가능성 ${v.score}점, 조회 ${Gen.viewStr(v.views)})`).join('\n');

    async channelInfo(urlOrHandle){
      const cfg = SettingsCfg.load();
      const parsed = parseChannelId(urlOrHandle);
      if (!parsed) return Gen.channelInfo(urlOrHandle);

      if (cfg.useReal && cfg.youtubeApiKey){
        try {
          const cacheKey = 'ch:' + parsed.value;
          return await cacheFetch(cacheKey, async () => {
            const param = parsed.type === 'id'
              ? `id=${encodeURIComponent(parsed.value)}`
              : parsed.type === 'handle'
              ? `forHandle=${encodeURIComponent(parsed.value)}`
              : `forUsername=${encodeURIComponent(parsed.value)}`;
            const json = await ytFetch(
              `channels?part=snippet,statistics,contentDetails&${param}`,
              cfg.youtubeApiKey
            );
            const ch = (json.items||[])[0];
            if (!ch) throw new Error('채널을 찾을 수 없습니다');

            const sn = ch.snippet || {};
            const st = ch.statistics || {};
            const subs       = +(st.subscriberCount||0);
            const totalViews = +(st.viewCount||0);
            const videoCount = +(st.videoCount||0);

            const uploadsId = ch.contentDetails?.relatedPlaylists?.uploads;
            let videos = [], uploadDates = [];
            if (uploadsId){
              const plJson = await ytFetch(
                `playlistItems?part=snippet,contentDetails&playlistId=${encodeURIComponent(uploadsId)}&maxResults=30`,
                cfg.youtubeApiKey
              );
              const items = plJson.items || [];
              uploadDates = items.map(i => new Date(i.snippet.publishedAt).getTime()).filter(Boolean);
              const vidIds = items.map(i => i.contentDetails?.videoId).filter(Boolean).slice(0,20);
              if (vidIds.length){
                const vJson = await ytFetch(
                  `videos?part=snippet,statistics,contentDetails&id=${vidIds.join(',')}`,
                  cfg.youtubeApiKey
                );
                videos = (vJson.items||[]).map((item,i)=>ytItemToVideo(item,i+1));
              }
            }

            let uploadFreqDays = null;
            if (uploadDates.length >= 2){
              uploadDates.sort((a,b)=>b-a);
              const diffs = [];
              for (let i=0; i<Math.min(uploadDates.length-1,15); i++)
                diffs.push((uploadDates[i]-uploadDates[i+1])/(86_400_000));
              uploadFreqDays = +(diffs.reduce((s,d)=>s+d,0)/diffs.length).toFixed(1);
            }

            const catCount = {};
            videos.forEach(v => { catCount[v.category.name] = (catCount[v.category.name]||0)+1; });
            const cats = Object.entries(catCount).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([name,cnt])=>[name, Math.round(cnt/videos.length*100)]);

            const thumbs = sn.thumbnails||{};
            const thumbUrl = (thumbs.medium||thumbs.high||thumbs.default||{}).url||null;

            return {
              id: ch.id,
              handle: sn.customUrl || parsed.value,
              name: sn.title||'알 수 없음',
              description: (sn.description||'').slice(0,200),
              thumbUrl, thumbColors: null,
              subs, totalViews, videoCount,
              uploadFreqDays,
              cats: cats.length ? cats : [['알 수 없음',100]],
              videos: videos.slice(0,10),
              isReal: true
            };
          });
        } catch(e){ toast('채널 API 오류: '+e.message); }
      }
      await wait(100);
      return Gen.channelInfo(urlOrHandle);
    },

    history: {

        const list = Store.read('history', []);
        if (list[0] && list[0].keyword === item.keyword) return;
        list.unshift(item);
        Store.write('history', list.slice(0, 60));
      },
      remove(id){ Store.write('history', Store.read('history', []).filter(x => x.id !== id)); },
      clear(){ Store.write('history', []); }
    }
  };
})();

  function titleForCat(catId, r){
    const list = TITLE_TEMPLATES[catId] || TITLE_TEMPLATES.vlog;
    return pick(r, list);
  }

  function thumbColors(seed){
    const r = rng(hash('tc:'+seed));
    const h1 = Math.floor(r()*360);
    const h2 = (h1 + 30 + Math.floor(r()*60)) % 360;
    return { g1: `oklch(0.65 0.16 ${h1})`, g2: `oklch(0.45 0.18 ${h2})` };
  }

  function durStr(sec){
    const m = Math.floor(sec/60), s = sec%60;
    if (m >= 60){ const h = Math.floor(m/60); const mm = m%60; return `${h}:${String(mm).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
    return `${m}:${String(s).padStart(2,'0')}`;
  }
  function viewStr(v){
    if (v >= 1_000_000) return (v/1_000_000).toFixed(1)+'M';
    if (v >= 1_000) return (v/1_000).toFixed(1)+'K';
    return String(v);
  }

  function makeVideo(seed, opts){
    const r = rng(hash('v:'+seed));
    const cat = opts.category
      ? CATEGORIES.find(c=>c.id===opts.category)
      : pick(r, CATEGORIES);
    const title = opts.title || titleForCat(cat.id, r);
    const channel = pick(r, CHANNELS);
    const views = Math.round(40_000 + r()*5_000_000 * (opts.boost||1));
    const delta24h = Math.round(views * (0.05 + r()*0.4));
    const likes = Math.round(views * (0.02 + r()*0.04));
    const ctr = +(2 + r()*9).toFixed(1);
    const retention = +(28 + r()*48).toFixed(1);
    const avd = Math.round(120 + r()*420);
    const dur = Math.round(180 + r()*1500);
    const publishedAgo = Math.round(1 + r()*48);
    const thumb = thumbColors(seed);
    const score = clamp(Math.round(ctr*4 + retention*0.7 + Math.log10(views)*3 + (delta24h/Math.max(views,1))*40), 30, 99);
    return {
      id: 'v_'+hash(seed).toString(36),
      title, channel, category:cat,
      views, delta24h, likes, ctr, retention, avd, durationSec:dur,
      publishedAgoH: publishedAgo, thumb, score
    };
  }

  function trending(opts={}){
    const region = opts.region || 'KR';
    const cat = opts.category || 'all';
    const win = opts.window || '24h';
    const seedBase = `tr:${region}:${cat}:${win}:${new Date().toDateString()}`;
    const rows = [];
    const N = 30;
    for (let i=0;i<N;i++){
      const boost = 1 + (N-i)/N * 0.7;
      rows.push(makeVideo(seedBase+':'+i, { category:cat==='all'?null:cat, boost }));
    }
    rows.sort((a,b)=> b.score - a.score);
    return rows.map((v,i)=>({...v, rank:i+1}));
  }

  /** 분야별 상위 10개씩 (전체 카테고리) */
  function trendingByCategory(opts={}){
    const region = opts.region || 'KR';
    const win = opts.window || '24h';
    return CATEGORIES.map(c => {
      const seedBase = `bc:${region}:${c.id}:${win}:${new Date().toDateString()}`;
      const rows = [];
      for (let i=0;i<14;i++){
        const boost = 1 + (14-i)/14 * 0.7;
        rows.push(makeVideo(seedBase+':'+i, { category:c.id, boost }));
      }
      rows.sort((a,b)=>b.score-a.score);
      return { category:c, videos: rows.slice(0,10).map((v,i)=>({...v, rank:i+1})) };
    });
  }

  function summary(region){
    const t = trending({region, window:'24h'});
    const top = t.slice(0,8);
    const r = rng(hash('sm:'+region+':'+new Date().toDateString()));
    return {
      totalTracked: 8200 + Math.floor(r()*1800),
      risingNow:    Math.round(280 + r()*120),
      topCategory:  pick(r, CATEGORIES).name,
      avgCtr:       +(4 + r()*3).toFixed(1),
      top
    };
  }

  function countries(){
    return COUNTRIES.map(c => {
      const r = rng(hash('c:'+c.code+':'+new Date().toDateString()));
      const top = trending({region:c.code})[0];
      const thumb = thumbColors('flag:'+c.code);
      return { ...c, thumb, topVideo: top, risingCount: 30 + Math.floor(r()*150), hotCategory: pick(r, CATEGORIES).name };
    });
  }

  /* ── 키워드 분석 ── */
  function relatedFor(keyword){
    const r = rng(hash('rel:'+keyword));
    return [keyword+' 후기', keyword+' 입문', keyword+' 추천', keyword+' 비교', keyword+' 챌린지', keyword+' 브이로그', keyword+' 루틴', keyword+' 한 달', keyword+' 가격', '대안 '+keyword]
      .sort(() => r()-0.5).slice(0,6);
  }
  function forecast(keyword, baseScore){
    const r = rng(hash('fc:'+keyword));
    const past = []; let v = 40 + (baseScore*0.3); const slope = (baseScore - 50) * 0.06;
    for (let i=0; i<7; i++){ past.push({ t:`-${(6-i)}M`, v: clamp(v + (r()-.5)*6 - i*0.4, 5, 95) }); v += slope*0.4 + (r()-.5)*3; }
    const fut = []; let mid = v;
    for (let i=1; i<=6; i++){
      const drift = slope + (r()-.5)*1.5; mid = clamp(mid + drift, 5, 98);
      const spread = 4 + i*1.4;
      fut.push({ t:`+${i}M`, mid, lo:clamp(mid-spread,0,100), hi:clamp(mid+spread,0,100) });
    }
    return { past, future: fut };
  }
  function ideaSet(keyword, r){
    const biz = sample(r, [
      { t:`${keyword} 시리즈 채널 컨셉`, d:`${keyword}를 중심으로 5개 에피소드 시리즈를 설계해 첫 30초 후킹을 통일하면 추천 흐름이 묶여 노출될 가능성이 있습니다.` },
      { t:`${keyword} 멤버십·구독 묶음`, d:`코어 시청자에게 ${keyword} 자료·아카이브를 정기 묶음으로 제공해 LTV를 끌어올릴 여지가 있습니다.` },
      { t:`${keyword} 콜라보 시즌`, d:`인접 주제 크리에이터와 시즌제 협업으로 신규 시청자 노출 확장 가능성이 보입니다.` },
      { t:`${keyword} 데이터 SaaS`, d:`${keyword} 영역의 공개 지표를 정제해 운영자가 쓰는 대시보드로 가공할 가능성이 있습니다.` },
    ], 3);
    const content = sample(r, [
      { t:`'${keyword}' 30초 후킹 5종`, d:`첫 30초에 시청자가 떠나지 않게 만드는 후킹 패턴 A/B 테스트 가능성이 있습니다.`, fmt:'쇼츠 · 롱폼' },
      { t:`현장 리포트: '${keyword}'를 실제로 써본 사람들`, d:`실사용자 인터뷰 기반 다큐 형식으로 신뢰 자산을 쌓을 여지가 있습니다.`, fmt:'롱폼' },
      { t:`'${keyword}' 비교 차트`, d:`핵심 옵션 5개를 가격·만족도·접근성 축으로 정리해 캐러셀로도 재활용할 수 있습니다.`, fmt:'카드뉴스' },
      { t:`AI가 분석한 '${keyword}' 1년`, d:`데이터 시각화 영상. 본 도구 결과를 자산화하는 메타 콘텐츠로 사용할 가능성이 있습니다.`, fmt:'쇼츠 · 롱폼' },
    ], 3);
    return { biz, content };
  }
  function risksFor(keyword, scores, r){
    const all = [
      { l:'high', t:'규제·정책 변동 가능성', d:`${keyword} 영역은 정책 변경 가능성이 있어 채널 정책 위반 위험도 함께 점검할 필요가 있습니다.` },
      { l:'med',  t:'주제 포화', d:`이미 다수 채널이 진입했을 가능성이 있어 차별점이 약하면 노출 비용이 빠르게 상승할 수 있습니다.` },
      { l:'low',  t:'단기 화제성 의존', d:`이슈가 짧게 끝날 가능성. 1차 노출 이후 리텐션 설계가 부족하면 빠르게 식을 수 있습니다.` },
      { l:'med',  t:'타깃 협소', d:`초기 코어 시청자가 분명하지만 확장 폭이 제한적일 수 있어 단계적 페르소나 확장이 필요합니다.` },
      { l:'low',  t:'시즌성', d:`시청 수요가 특정 시기에 몰릴 가능성이 있어 연간 분포를 미리 점검해두면 좋습니다.` },
      { l:'high', t:'운영 난이도', d:`제작 품질이 인력·장비 의존도가 높을 수 있어 1인 운영 시 지속성 검토가 필요합니다.` },
    ];
    const sorted = all.sort(() => r()-0.5).slice(0,4);
    if (scores.risk > 70) sorted[0].l = 'high';
    if (scores.risk < 35) sorted.forEach(x => { if(x.l==='high') x.l='med'; });
    return sorted;
  }
  function analysis(keyword){
    const r = rng(hash('a:'+keyword));
    const cat = pick(r, CATEGORIES);
    const growth   = Math.round(40 + r()*55);
    const business = Math.round(35 + r()*60);
    const content  = Math.round(45 + r()*50);
    const risk     = Math.round(20 + r()*70);
    const overall  = Math.round(growth*0.35 + business*0.30 + content*0.20 + (100-risk)*0.15);
    return {
      id: 'a_'+hash(keyword+Date.now()).toString(36),
      keyword, category:cat,
      summary: `'${keyword}'은(는) ${cat.name} 영역에서 ${overall>=70?'강한 상승 신호':overall>=50?'완만한 상승 가능성':'미약하지만 누적 중인 신호'}가 관측됩니다. 단정적 예측이 아닌 가능성 기반 추정이며 실행 전 추가 검증이 필요합니다.`,
      scores: { overall, growth, business, content, risk },
      forecast: forecast(keyword, overall),
      horizons: {},
      related: relatedFor(keyword),
      ideas: ideaSet(keyword, r),
      risks: risksFor(keyword, { risk }, r),
      createdAt: Date.now()
    };
  }

  /** 키워드와 관련된 영상 10개 (분석 페이지 하단용) */

    const r = rng(hash('rv:'+keyword));
    const out = [];
    const variations = [
      `${keyword} 입문 가이드`,
      `${keyword} 한 달 후기`,
      `${keyword} 5가지 정리`,
      `${keyword} 직접 해봤습니다`,
      `${keyword} 비교 분석`,
      `${keyword} 챌린지 일주일`,
      `${keyword} 추천 베스트`,
      `초보를 위한 ${keyword}`,
      `${keyword} 흔한 실수 5가지`,
      `${keyword} 1년 운용 결과`,
      `${keyword} 알고리즘 노출 분석`,
      `현장 리포트: ${keyword}`,
    ];
    for (let i=0; i<n; i++){
      out.push(makeVideo('rv:'+keyword+':'+i, {
        title: variations[i % variations.length],
        boost: 1 + (n-i)/n * 0.6
      }));
    }
    out.sort((a,b)=>b.score-a.score);
    return out.map((v,i)=>({...v, rank:i+1}));
  }

      return Math.round(base + (r()-0.5)*10);

      const center = 2.5 + i*2.5;
      const dist = Math.abs(center - 12) / 12;

      return Math.round(base + (r()-0.5)*8);

    const heat = [];

      { t:'30~45자 사이의 제목이 가장 자주 관측됩니다', d:'너무 짧으면 맥락이 부족해 보일 가능성이, 너무 길면 모바일 환경에서 잘릴 가능성이 있습니다.' },
      { t:'8~14분 길이의 영상이 안정적인 시청 유지를 보이는 경향', d:'영상 호흡을 한 번에 가져가기 좋은 길이라는 가설이 가능합니다. 카테고리에 따라 차이가 큽니다.' },
      { t:'평일 19~22시, 주말 정오와 야간이 업로드 적기로 관측', d:'노출 첫 4시간의 클릭률이 알고리즘 신호로 작용할 가능성이 큽니다.' },
      { t:'썸네일에 1개 인물 클로즈업이 포함되면 CTR 가능성이 평균보다 높게 관측', d:'다만 카테고리에 따라 반대 결과가 나오기도 하므로 자기 채널 데이터로 검증이 필요합니다.' },
      { t:'질문형 제목이 도전형 다음으로 자주 사용', d:'시청자에게 답을 찾도록 유도해 첫 30초 이탈을 줄일 가능성이 있습니다.' },
    ];
    return { lenBins, durBins, heat, hooks, thumbs, insights };
  }

  /* ── 알고리즘 ── */
  function algorithm(){
    const r = rng(hash('alg:'+new Date().toDateString()));
    const factors = [
      { t:'클릭률(CTR)', w: 22, score: 64 + Math.round(r()*10),
        d:'노출 대비 클릭 비율. 첫 4–8시간 CTR이 추천 확장 신호로 작용할 가능성이 큽니다. 썸네일·제목·시청자 맥락이 동시에 영향을 줍니다.' },
      { t:'평균 시청 시간(AVD)', w: 20, score: 58 + Math.round(r()*12),
        d:'얼마나 오래 시청했는지의 절대값. 영상이 짧을수록 유리해 보일 수 있으나 절대 시간 자체가 점수로 작용할 가능성이 있습니다.' },
      { t:'시청 유지율(Retention)', w: 18, score: 52 + Math.round(r()*14),
        d:'영상 길이 대비 시청한 비율. 인트로 5–30초 구간의 이탈 곡선이 결정적으로 작용할 가능성이 있습니다.' },
      { t:'세션 체류', w: 14, score: 47 + Math.round(r()*14),
        d:'해당 영상이 끝난 뒤 시청자가 플랫폼에 계속 머무는지. 자연스러운 이어보기 설계가 영향을 줄 수 있습니다.' },
      { t:'반응 신호(좋아요·댓글·공유)', w: 10, score: 50 + Math.round(r()*12),
        d:'행동 신호. 댓글 흐름이 길게 이어지는 영상은 토픽 권위로 누적될 가능성이 있습니다.' },
      { t:'신선도', w: 8, score: 55 + Math.round(r()*16),
        d:'발행 직후 가속 구간에서의 성과. 시간이 지날수록 가중치가 빠르게 감쇠할 수 있습니다.' },
      { t:'채널 주제 권위', w: 8, score: 62 + Math.round(r()*10),
        d:'채널이 특정 주제를 얼마나 일관되게 다뤄왔는지. 다른 신호가 비슷하면 권위가 누적된 채널에 우선 노출될 가능성이 있습니다.' },
    ];
    const principles = [
      { t:'알고리즘은 영상이 아니라 시청자를 추천한다', d:'개별 영상의 절대 성과보다 "이 시청자에게 이 영상을 보였을 때의 만족도"가 핵심 변수로 작용할 가능성이 큽니다.' },
      { t:'첫 24시간이 채널 전체의 가속도에 영향', d:'발행 직후 CTR과 유지율이 안정적으로 나오면 다음 영상의 출발선도 함께 올라갈 가능성이 있습니다.' },
      { t:'단일 신호의 극단치를 만드는 전략은 위험', d:'CTR만 비정상적으로 높고 유지율이 낮으면 클릭베이트로 분류돼 노출이 빠르게 식을 가능성이 있습니다.' },
      { t:'쇼츠와 롱폼은 거의 별개의 채널처럼 작동', d:'두 포맷의 시청자 페르소나가 다른 경우가 많아 각각 별도의 운영 전략이 필요합니다.' },
    ];
    return { factors, principles };
  }

  function channelInfo(urlOrHandle){
    const seed = hash('ch:'+urlOrHandle);
    const r = rng(seed);
    const names = ['테크맵 스튜디오','크리에이터 X','인사이트 TV','미래 채널','트렌드 연구소','데일리 리뷰','스마트 라이프','글로벌 K','코드와 함께','심야 토크룸','한 끼 식탁','여행 기록사'];
    const chName = names[seed % names.length];
    const subs       = Math.round(10_000 + r()*4_000_000);
    const videoCount = Math.round(50 + r()*600);
    const totalViews = Math.round(subs * (100 + r()*800));
    const uploadFreqDays = +(1.5 + r()*14).toFixed(1);
    const topCatObj = pick(r, CATEGORIES);
    const cats = [
      [topCatObj.name, Math.round(40+r()*30)],
      [pick(r,CATEGORIES).name, Math.round(15+r()*15)],
      [pick(r,CATEGORIES).name, Math.round(5+r()*10)],
    ];
    const videos = [];
    for (let i=0;i<10;i++){
      const v = makeVideo('ch:'+urlOrHandle+':'+i, {category:topCatObj.id, boost:1+(10-i)/10*0.5});
      v.channel = chName;
      videos.push({...v, rank:i+1});
    }
    const tc = thumbColors('ch:'+urlOrHandle);
    return {
      id: 'UC'+seed.toString(16).padStart(22,'0').slice(0,22),
      handle: '@ch-demo-'+seed.toString(36).slice(0,6),
      name: chName,
      description: `${chName}는 ${topCatObj.name} 분야를 중심으로 다양한 콘텐츠를 제작합니다. (가상 데이터)`,
      thumbUrl: null, thumbColors: tc,
      subs, totalViews, videoCount,
      uploadFreqDays,
      cats,
      videos,
      isReal: false
    };
  }

  return { CATEGORIES, COUNTRIES, hash, rng, thumbColors, viewStr, durStr,
           summary, trending, trendingByCategory, countries, analysis,
           relatedVideos, success, algorithm, channelInfo };
})();

/* ───────── App / Router ───────── */
const App = {
  view: 'home',
  region: Store.read('region', 'KR'),
  rankingCat: 'all',
  rankingWindow: '24h',
  current: null,
  countryFocus: null,
  trendingMode: 'group', // 'group' (분야별 10개씩) | 'flat' (단일 카테고리 그리드)

  go(view, payload){
    this.view = view;
    if (view === 'analysis' && payload) this.current = payload;
    if (view === 'countryDetail' && payload) this.countryFocus = payload;
    document.querySelectorAll('.nav__item[data-view]').forEach(el => {
      el.classList.toggle('is-active',
        el.dataset.view === view ||
        (view==='countryDetail' && el.dataset.view==='countries'));
    });
    render();
    window.scrollTo(0,0);
  },

  setRegion(code){
    this.region = code;
    Store.write('region', code);
    const c = Gen.COUNTRIES.find(x=>x.code===code);
    document.getElementById('regionIso').textContent = code;
    document.getElementById('regionName').textContent = c ? c.name : code;
    render();
  },

  async analyzeAndShow(keyword){
    if (!keyword || !keyword.trim()) return;
    this.view = 'analysis'; this.current = null;
    document.querySelectorAll('.nav__item[data-view]').forEach(el => el.classList.toggle('is-active', el.dataset.view === 'analysis'));
    renderLoading(keyword);
    const result = await API.analyze(keyword);
    result.horizons = { m1: result.forecast.future[0], m3: result.forecast.future[2], m6: result.forecast.future[5] };
    this.current = result;
    API.history.save({ id: result.id, keyword: result.keyword, category: result.category, scores: result.scores, createdAt: result.createdAt });
    updateNavCounts();
    render();
    toast(`'${keyword}' 분석 완료`);
  }
};

/* ───────── Views ───────── */
const main = document.getElementById('main');

function render(){
  switch(App.view){
    case 'home':          return renderHome();
    case 'trending':      return renderTrending();
    case 'countries':     return renderCountries();
    case 'countryDetail': return renderCountryDetail();
    case 'analysis':      return renderAnalysis();
    case 'success':       return renderSuccess();
    case 'algorithm':     return renderAlgorithm();
    case 'history':       return renderHistory();
    case 'settings':      return renderSettings();
    case 'channel':       return renderChannel();
    case 'compare':       return renderCompare();
    default:              return renderHome();
  }
}

function thumb(v, opts={}){
  const dur = Gen.durStr(v.durationSec);
  // Real thumbnail: explicit URL or YouTube CDN (real videos only, not mock IDs)
  const thumbUrl = v.thumb?.url || (v.ytId && v.isReal ? `https://i.ytimg.com/vi/${escAttr(v.ytId)}/mqdefault.jpg` : null);
  const isReal = !!thumbUrl;
  const bgStyle = isReal
    ? `background-image:url('${thumbUrl}');background-size:cover;background-position:center`
    : `--g1:${v.thumb?.g1||'oklch(0.7 0.12 260)'}; --g2:${v.thumb?.g2||'oklch(0.55 0.16 220)'}`;
  return `
    <div class="thumb${isReal?' thumb--real':''}" style="${bgStyle}">
      ${opts.rank ? `<div class="thumb__rank">#${opts.rank}</div>` : ''}
      ${opts.cat !== false ? `<div class="thumb__cat">${esc(v.category.name)}</div>` : ''}
      <div class="thumb__play">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="thumb__dur">${dur}</div>
    </div>
  `;
}
function videoCard(v, opts={}){
  const _key = v.id || ('v_'+Gen.hash(v.title+':'+v.channel).toString(36));
  VidRegistry[_key] = v;
  return `
    <div class="vid-card" data-kw="${escAttr(v.title)}" data-vplay="${escAttr(_key)}">
      ${thumb(v, { rank: opts.rank, cat:true })}
      <div class="vid-card__body">
        <div class="vid-card__t">${esc(v.title)}</div>
        <div class="vid-card__ch">${esc(v.channel)}</div>
        <div class="vid-card__meta">

          <span>${v.publishedAgoH}시간 전</span>

        <span>+<b>${Gen.viewStr(v.delta24h)}</b>/24h</span>

function gauge(score){
  const r = 40, c = 2*Math.PI*r;
  const off = c * (1 - score/100);
  const color = scoreColor(score);
  return `
    <div class="gauge">
      <svg width="96" height="96" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--bg-sunken)" stroke-width="10"/>
        <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="10" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/>
      </svg>
      <div class="gauge__val"><div class="gauge__num">${score}</div><div class="gauge__sub">/ 100</div></div>
    </div>
  `;
}
function scoreCard(label, val, note, inverse=false){
  const color = inverse ? (val>60 ? 'var(--danger)' : val>35 ? 'var(--warn)' : 'var(--ok)') : 'var(--ink)';

function ideaRow(it, n, badge){

function forecastChart(fc){
  const W = 640, H = 220, P = 28;
  const series = [...fc.past.map(p=>({t:p.t, v:p.v, kind:'past'}))].concat(fc.future.map(f=>({t:f.t, v:f.mid, lo:f.lo, hi:f.hi, kind:'future'})));
  const n = series.length;
  const x = i => P + (W - P*2) * i / (n-1);
  const y = v => H - P - (H - P*2) * (v/100);
  const past = series.filter(s=>s.kind==='past');
  const future = series.filter(s=>s.kind==='future');
  const joinIdx = past.length - 1;
  const linePast = past.map((p,i)=>`${i===0?'M':'L'}${x(i)},${y(p.v)}`).join(' ');
  const lineFutPts = [past[past.length-1], ...future];
  const lineFut = lineFutPts.map((p,i)=>`${i===0?'M':'L'}${x(joinIdx+i)},${y(p.v ?? p.mid)}`).join(' ');
  const top = future.map((f,i)=>`${i===0?'M':'L'}${x(joinIdx+1+i)},${y(f.hi)}`).join(' ');
  const bot = future.slice().reverse().map((f,i)=>`L${x(joinIdx+future.length-i)},${y(f.lo)}`).join(' ');
  const band = `${top} ${bot} Z`;
  const grid = [20,40,60,80].map(v => `<line x1="${P}" x2="${W-P}" y1="${y(v)}" y2="${y(v)}" stroke="var(--line)" stroke-dasharray="3 4"/>`).join('');
  const labelsY = [0,20,40,60,80,100].map(v => `<text x="${P-8}" y="${y(v)+3}" font-size="10" fill="var(--ink-4)" text-anchor="end">${v}</text>`).join('');
  const labelsX = series.map((s,i)=> (i % 2 === 0 || i === n-1) ? `<text x="${x(i)}" y="${H-P+16}" font-size="10" fill="var(--ink-4)" text-anchor="middle">${s.t}</text>` : '').join('');
  const joinLine = `<line x1="${x(joinIdx)}" x2="${x(joinIdx)}" y1="${P}" y2="${H-P}" stroke="var(--line-strong)" stroke-dasharray="4 4"/>`;
  const joinLbl = `<text x="${x(joinIdx)+6}" y="${P+10}" font-size="10" font-weight="600" fill="var(--ink-3)">현재</text>`;
  const dotsPast = past.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.v)}" r="2.5" fill="var(--ink-2)"/>`).join('');
  const dotsFut = future.map((f,i)=>`<circle cx="${x(joinIdx+1+i)}" cy="${y(f.mid)}" r="3" fill="#fff" stroke="var(--accent)" stroke-width="2"/>`).join('');
  return `
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%; height:240px">
        ${grid}${labelsY}${labelsX}
        <path d="${band}" fill="var(--accent-soft)" opacity="0.7"/>
        <path d="${linePast}" fill="none" stroke="var(--ink-2)" stroke-width="2"/>
        <path d="${lineFut}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-dasharray="4 4"/>
        ${dotsPast}${dotsFut}${joinLine}${joinLbl}
      </svg>
    </div>
  `;
}

function treemap(factors){
  const total = factors.reduce((s,f)=>s+f.w,0);
  const top = factors.slice(0,3);
  const bot = factors.slice(3);
  const sumTop = top.reduce((s,f)=>s+f.w,0);
  const sumBot = bot.reduce((s,f)=>s+f.w,0);
  const hueOf = (i) => 262 + i*14;
  const cell = (f, i, denom, h) => `
    <div style="flex:${f.w/denom}; height:${h}px; background:oklch(${0.96 - (i*0.02)} ${0.04 + i*0.01} ${hueOf(i)}); border-radius:8px; padding:10px; display:flex; flex-direction:column; justify-content:space-between; min-width:0; overflow:hidden">
      <div style="font-size:11.5px; font-weight:650; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${esc(f.t)}</div>
      <div style="font-size:13px; font-weight:700; font-variant-numeric:tabular-nums">${Math.round(f.w/total*100)}%</div>
    </div>
  `;
  return `
    <div style="display:flex; flex-direction:column; gap:6px">
      <div style="display:flex; gap:6px">${top.map((f,i)=>cell(f,i,sumTop,90)).join('')}</div>
      <div style="display:flex; gap:6px">${bot.map((f,i)=>cell(f,i+3,sumBot,60)).join('')}</div>
    </div>
  `;
}

      </div>
    `}
  `;
  document.querySelectorAll('[data-action="open"]').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); App.analyzeAndShow(b.dataset.kw); }));
  document.querySelectorAll('[data-action="del"]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();

  }));

  if (clr) clr.addEventListener('click', () => { API.history.clear(); updateNavCounts(); renderHistory(); toast('히스토리를 모두 삭제했습니다'); });

}

function renderCompare(){
  const stored = App._compareChannels || [];
  const channels = stored.length ? stored : ['','',''];
  while (channels.length < 2) channels.push('');
  while (channels.length > 3) channels.pop();

  main.innerHTML = `
    <div class="page-head">
      <div><h1>채널 비교</h1><p>2~3개 채널을 나란히 비교합니다. URL 또는 @핸들을 입력하세요.</p></div>
    </div>
    <div class="card" style="margin-bottom:24px">
      <div class="card__hd"><h3>채널 입력</h3><span class="muted">최소 2개, 최대 3개</span></div>
      <form id="cmpForm">
        <div id="cmpInputs">
          ${channels.map((v,i)=>`
            <div class="ch-input-row" id="cmpRow${i}">
              <div class="ch-input-idx">${i+1}</div>
              <input class="field__input cmp-ch-input" style="height:40px;flex:1" data-idx="${i}"
                     placeholder="https://www.youtube.com/@채널명" value="${escAttr(v)}" autocomplete="off"/>
              ${i>=2 ? `<button type="button" class="ch-remove-btn" data-remove="${i}">✕</button>` : '<div style="width:40px"></div>'}
            </div>`).join('')}
        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button type="submit" class="btn btn--primary" style="height:40px;padding:0 20px">비교 시작</button>
          <button type="button" id="addChBtn" class="btn" style="height:40px;padding:0 14px">+ 채널 추가</button>
        </div>
      </form>
    </div>
    <div id="cmpResult"></div>`;

  function getInputValues(){
    return [...document.querySelectorAll('.cmp-ch-input')].map(i=>i.value.trim());
  }

  document.getElementById('addChBtn').addEventListener('click', () => {
    const container = document.getElementById('cmpInputs');
    const idx = container.children.length;
    if (idx >= 3){ toast('최대 3개까지 비교할 수 있습니다'); return; }
